<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>보이스드라마 리뷰 카드 메이커</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#0c0c14;--surface:#16161e;--input:#1e1e2a;--border:rgba(255,255,255,0.08);--text:#e0e0e8;--sub:#6a6a80;--muted:#4e4e66;--accent:#a8c8e8;--scrollbar:rgba(255,255,255,0.15);--shadow:rgba(0,0,0,0.4);--active-text:#fff;--overlay:rgba(0,0,0,0.85)}
[data-theme="light"]{--bg:#f0f0f5;--surface:#fff;--input:#ededf3;--border:rgba(0,0,0,0.09);--text:#1a1a2e;--sub:#7a7a90;--muted:#a8a8be;--accent:#5a7a9a;--scrollbar:rgba(0,0,0,0.12);--shadow:rgba(0,0,0,0.06);--active-text:#1a1a2e;--overlay:rgba(0,0,0,0.45)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);font-family:'Pretendard',-apple-system,sans-serif;color:var(--text);transition:background .3s,color .3s;overflow:hidden}
.wrap{height:100vh;max-width:1280px;margin:0 auto;padding:12px 18px;display:flex;flex-direction:column;gap:10px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.brand{display:flex;align-items:baseline;gap:10px;min-width:0;overflow:hidden}
.brand h1{font-size:15px;font-weight:800;letter-spacing:-0.01em;white-space:nowrap}
.brand p{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-group{display:flex;gap:4px;align-items:center;flex-shrink:0}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.t-btn{padding:5px 12px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;background:var(--input);color:var(--sub);border:1px solid var(--border);transition:all .2s}
.t-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.t-btn-sm{padding:3px 9px;font-size:13px;line-height:1}
.layout{flex:1;display:grid;grid-template-columns:minmax(440px,1.1fr) minmax(360px,1fr);gap:18px;min-height:0}
@media(max-width:900px){
  body{overflow:auto}
  .wrap{height:auto;min-height:100vh;padding:12px 14px 30px}
  .layout{grid-template-columns:1fr;display:flex;flex-direction:column;gap:12px;overflow:visible}
  /* Mode A (default) — sticky preview top */
  .preview-wrap{order:-1;position:sticky;top:0;background:var(--bg);padding:6px 0 10px;z-index:10;border-bottom:1px solid var(--border);align-items:center}
  #preview{max-height:42vh;width:auto;max-width:100%}
  .editor{overflow:visible;min-height:auto;flex:none}
  /* Mode C — floating mini, editor full */
  body[data-pv-mode="float"] .preview-wrap{display:none}
  body[data-pv-mode="float"] .pv-mini{display:flex}
  body[data-pv-mode="float"] .wrap{padding-bottom:14px}
  .pv-mode-switch{display:flex}
}
.pv-mode-switch{display:none;gap:3px;align-items:center}
.pv-mode-switch .t-btn{padding:5px 9px;font-size:13px}
.pv-mini{display:none;position:fixed;bottom:18px;right:18px;width:108px;height:78px;border-radius:12px;background:var(--surface);box-shadow:0 10px 30px var(--shadow);border:1.5px solid var(--accent);cursor:pointer;z-index:50;overflow:hidden;align-items:center;justify-content:center;padding:5px;transition:transform .2s ease,box-shadow .2s ease}
.pv-mini:hover,.pv-mini:active{transform:scale(1.05);box-shadow:0 14px 36px var(--shadow)}
.pv-mini canvas{max-width:100%;max-height:100%;display:block;border-radius:6px}
.pv-mini::after{content:"⛶";position:absolute;top:4px;right:4px;font-size:10px;color:#fff;background:rgba(0,0,0,0.55);width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700}
.pv-full{display:none;position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(8px);z-index:9500;justify-content:center;align-items:center;padding:20px;flex-direction:column;gap:10px;opacity:0;transition:opacity .25s ease}
.pv-full.open{display:flex;opacity:1}
.pv-full canvas{max-width:100%;max-height:calc(100vh - 100px);border-radius:14px;box-shadow:0 14px 50px var(--shadow);display:block;transform:translateY(8px);transition:transform .25s ease}
.pv-full.open canvas{transform:translateY(0)}
.pv-full-close{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:flex-end;box-shadow:0 4px 12px var(--shadow)}
.editor{background:var(--surface);border-radius:14px;padding:12px 14px;border:1px solid var(--border);overflow-y:auto;transition:background .3s;min-height:0;display:flex;flex-direction:column}
.editor::-webkit-scrollbar{width:6px}.editor::-webkit-scrollbar-track{background:transparent}.editor::-webkit-scrollbar-thumb{background-color:var(--scrollbar);border-radius:3px}
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px 10px;flex:1}
.editor-grid .full{grid-column:1/-1}
.preview-wrap{display:flex;align-items:center;justify-content:center;min-height:0;min-width:0}
#preview{max-height:calc(100vh - 60px);max-width:100%;width:auto;height:auto;border-radius:14px;box-shadow:0 8px 40px var(--shadow);display:block}
label{display:block;font-size:10.5px;font-weight:600;color:var(--sub);margin-bottom:3px;letter-spacing:-0.01em}
.field{margin:0}
input[type=text],select,textarea{width:100%;background:var(--input);border:1px solid var(--border);border-radius:7px;padding:6px 9px;font-size:12.5px;color:var(--text);font-family:inherit;outline:none;transition:background .3s}
textarea{resize:none;line-height:1.45}::placeholder{color:var(--muted)}
.thumb-box{border:1.5px dashed var(--border);border-radius:9px;padding:6px 10px;text-align:center;cursor:pointer;background:var(--input);display:flex;align-items:center;justify-content:center;gap:8px;min-height:42px}
.thumb-box span{font-size:12px;color:var(--sub)}
.thumb-preview{width:30px;height:30px;border-radius:5px;object-fit:cover}
.thumb-actions{display:none;gap:5px;margin-top:4px}.thumb-actions.show{display:flex}
.thumb-act-btn{flex:1;padding:4px 0;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:var(--input);color:var(--accent);border:1px solid rgba(128,160,200,0.2);text-align:center;transition:all .15s}
.thumb-act-btn:hover{opacity:.8}
.thumb-act-del{color:#e74c3c;border-color:rgba(231,76,60,0.25)}.thumb-act-del:hover{background:rgba(231,76,60,0.08)}
.rating-row{display:flex;gap:3px}
.rating-btn{flex:1;padding:5px 0;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:var(--input);color:var(--sub);border:1px solid var(--border);text-align:center;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rating-btn.active-none{border:1.5px solid #718093;background:rgba(113,128,147,0.15);color:var(--active-text)}
.rating-btn.active-all{border:1.5px solid #2ecc71;background:rgba(46,204,113,0.15);color:var(--active-text)}
.rating-btn.active-r15{border:1.5px solid #e67e22;background:rgba(230,126,34,0.15);color:var(--active-text)}
.rating-btn.active-r18{border:1.5px solid #e74c3c;background:rgba(231,76,60,0.15);color:var(--active-text)}
.export-btn{width:100%;padding:9px 0;border:none;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;color:#fff}
.color-grid{display:flex;gap:5px;flex-wrap:wrap;background:var(--input);padding:6px;border-radius:7px;border:1px solid var(--border)}
.color-swatch{width:19px;height:19px;border-radius:4px;cursor:pointer;border:1px solid rgba(0,0,0,0.15);transition:transform .15s,box-shadow .15s}
.color-swatch.active{border:2px solid var(--text);box-shadow:0 0 6px var(--shadow);transform:scale(1.1)}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch-auto{background:conic-gradient(from 45deg,#fff 0deg 90deg,#444 90deg 180deg,#fff 180deg 270deg,#444 270deg 360deg) !important;position:relative}
.color-swatch-auto::after{content:"A";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--accent);background:var(--input);border-radius:50%;width:11px;height:11px;margin:auto;line-height:1}
.editor-credit{text-align:center;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:6px}
/* range input - smooth, friendly thumb */
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;background:transparent;cursor:pointer;outline:none;padding:8px 0}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:var(--input);border:1px solid var(--border)}
input[type=range]::-moz-range-track{height:4px;border-radius:2px;background:var(--input);border:1px solid var(--border)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);box-shadow:0 1px 4px var(--shadow);margin-top:-7px;transition:transform .15s ease,box-shadow .15s ease}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);box-shadow:0 1px 4px var(--shadow);transition:transform .15s ease,box-shadow .15s ease}
input[type=range]:hover::-webkit-slider-thumb,input[type=range]:active::-webkit-slider-thumb{transform:scale(1.2);box-shadow:0 2px 8px var(--shadow)}
input[type=range]:hover::-moz-range-thumb,input[type=range]:active::-moz-range-thumb{transform:scale(1.2);box-shadow:0 2px 8px var(--shadow)}
/* IMAGE EDITOR MODAL — minimal, flat */
.ie-overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:9999;justify-content:center;align-items:center;backdrop-filter:blur(8px);opacity:0;transition:opacity .25s ease}
.ie-overlay.open{display:flex;opacity:1}
.ie-modal{background:var(--surface);border-radius:18px;border:1px solid var(--border);width:95vw;max-width:720px;max-height:95vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 60px var(--shadow);transform:translateY(8px);transition:transform .25s ease}
.ie-overlay.open .ie-modal{transform:translateY(0)}
.ie-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
.ie-header h2{font-size:14px;font-weight:700;letter-spacing:-0.01em}
.ie-close{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--sub);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.ie-close:hover{background:var(--input);color:var(--text)}
.ie-toolbar{display:flex;gap:2px;padding:4px 14px 12px;flex-wrap:wrap;align-items:center}
.ie-tool-btn{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--sub);border:none;transition:background .15s,color .15s;white-space:nowrap}
.ie-tool-btn:hover{color:var(--text);background:var(--input)}
.ie-tool-btn.active{background:var(--input);color:var(--accent)}
.ie-separator{width:1px;height:18px;background:var(--border);margin:0 6px;opacity:.6}
.ie-opts{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.ie-opts label{font-size:11px;color:var(--sub);margin:0;font-weight:600}
.ie-opts input[type=range]{width:88px;padding:6px 0}
.ie-opts span{font-size:11px;color:var(--accent);font-weight:700;min-width:32px;text-align:right}
.ie-canvas-wrap{flex:1;overflow:auto;display:flex;justify-content:center;align-items:center;padding:14px;background:var(--bg);position:relative;min-height:240px}
.ie-canvas-wrap canvas{border-radius:8px;cursor:crosshair;max-width:100%;max-height:60vh;touch-action:none}
@media(max-width:600px){
  .ie-modal{max-height:96vh;border-radius:14px;width:100vw}
  .ie-header{padding:10px 14px}
  .ie-header h2{font-size:13px}
  .ie-toolbar{padding:2px 8px 8px;gap:0;justify-content:flex-start}
  .ie-tool-btn{padding:6px 9px;font-size:11px}
  .ie-separator{margin:0 3px}
  .ie-opts{margin-left:0;width:100%;padding:6px 0 0;justify-content:flex-start}
  .ie-canvas-wrap{padding:10px;min-height:180px}
  .ie-canvas-wrap canvas{max-height:48vh}
  .ie-footer{padding:10px 14px}
  .ie-btn{padding:8px 18px;font-size:12px}
  .ie-filter-panel{padding:6px 14px 10px;gap:6px}
  .ie-filter-row label{min-width:48px;font-size:10.5px}
  .ie-filter-row span{min-width:30px}
}
.ie-footer{display:flex;gap:8px;padding:12px 18px;justify-content:flex-end}
.ie-btn{padding:9px 22px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;border:none;transition:background .15s,opacity .15s,box-shadow .15s}
.ie-btn-cancel{background:transparent;color:var(--sub)}.ie-btn-cancel:hover{background:var(--input);color:var(--text)}
.ie-btn-apply{background:var(--accent);color:var(--bg)}.ie-btn-apply:hover{filter:brightness(1.08);box-shadow:0 4px 14px var(--shadow)}
.ie-btn-sm{padding:6px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--sub);transition:background .15s,color .15s}
.ie-btn-sm:hover{background:var(--input);color:var(--text)}
.ie-btn-sm.active{background:var(--input);color:var(--accent)}
.ie-btn-sm.danger{color:#e74c3c}
.ie-btn-sm.danger:hover{background:rgba(231,76,60,0.08);color:#e74c3c}
.ie-crop-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:#fff;font-size:11px;padding:5px 12px;border-radius:14px;pointer-events:none;white-space:nowrap;font-weight:500}
.ie-filter-panel{padding:10px 18px 14px;display:flex;flex-direction:column;gap:10px}
.ie-filter-row{display:flex;align-items:center;gap:10px;width:100%}
.ie-filter-row label{min-width:56px;text-align:left;font-size:11px;color:var(--sub);font-weight:600;margin:0}
.ie-filter-row input[type=range]{flex:1;padding:6px 0}
.ie-filter-row span{min-width:34px;font-size:11px;color:var(--accent);font-weight:700;text-align:right}
</style>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><h1 id="headerTitle">🎧 보이스드라마 리뷰 카드</h1><p id="headerSub">플레이어 스타일 메이커</p></div>
    <div class="tb-group">
      <div class="pv-mode-switch" role="group" aria-label="미리보기 위치">
        <button class="t-btn active" id="pvStickyBtn" onclick="setPvMode('sticky')" title="상단 고정">📌</button>
        <button class="t-btn" id="pvFloatBtn" onclick="setPvMode('float')" title="플로팅 미니">🪟</button>
        <div class="tb-sep"></div>
      </div>
      <button class="t-btn active" id="btnKo" onclick="setLanguage('ko')">한국어</button>
      <button class="t-btn" id="btnJa" onclick="setLanguage('ja')">日本語</button>
      <div class="tb-sep"></div>
      <button class="t-btn t-btn-sm" id="tmDark" onclick="setThemeMode('dark')">🌙</button>
      <button class="t-btn t-btn-sm" id="tmLight" onclick="setThemeMode('light')">☀️</button>
    </div>
  </div>
  <div class="layout">
    <div class="editor">
      <div class="editor-grid">
        <div class="field full"><label id="lblTheme">테마</label><select id="themeSelect"></select></div>
        <div class="field full"><label id="lblThumb">썸네일</label>
          <div class="thumb-box" id="thumbBox" onclick="document.getElementById('fileInput').click()"><input type="file" id="fileInput" accept="image/*" style="display:none"><span id="thumbLabel">클릭하여 업로드</span></div>
          <div class="thumb-actions" id="thumbActions">
            <button class="thumb-act-btn" onclick="openImageEditor()">✂️ 편집</button>
            <button class="thumb-act-btn" onclick="document.getElementById('fileInput').click()">🔄 변경</button>
            <button class="thumb-act-btn thumb-act-del" onclick="removeThumb()">🗑 제거</button>
          </div>
        </div>
        <div class="field full"><label id="lblTitle">작품 제목</label><input type="text" id="inTitle" placeholder="작품 제목을 입력하세요"></div>
        <div class="field"><label id="lblCircle">서클명</label><input type="text" id="inCircle" placeholder="서클명"></div>
        <div class="field"><label id="lblArtist">성우명</label><input type="text" id="inArtist" placeholder="CV. 성우명"></div>
        <div class="field"><label id="lblGenre">장르 · 키워드</label><input type="text" id="inGenre" placeholder="로맨스 · 달달"></div>
        <div class="field"><label id="lblRating">등급</label><div class="rating-row" id="ratingRow"></div></div>
        <div class="field full"><label id="lblStar">작품 별점</label><div class="rating-row" id="starSelectRow"></div></div>
        <div class="field full"><label id="lblHeart">수위 · 농도</label><div class="rating-row" id="heartSelectRow"></div></div>
        <div class="field full"><label id="lblSlider">재생 바 위치</label><input type="range" id="progressSlider" min="0" max="1" step="0.01" value="0.55"></div>
        <div class="field full"><label id="lblReview">리뷰</label><textarea id="inReview" rows="2" placeholder="작품에 대한 리뷰를 작성해주세요"></textarea></div>
        <div class="field full"><label id="lblColor">리뷰 텍스트 색상</label><div class="color-grid" id="colorGrid"></div></div>
        <div class="field full"><label id="lblReviewer">작성자</label><input type="text" id="inReviewer" placeholder="@ID 또는 닉네임"></div>
        <button class="export-btn full" id="exportBtn" onclick="exportImage()">📥 이미지 저장</button>
      </div>
      <div class="editor-credit">design by coconut</div>
    </div>
    <div class="preview-wrap"><canvas id="preview"></canvas></div>
  </div>
</div>
<div class="pv-mini" id="pvMini" onclick="openPvFull()" title="미리보기 크게 보기"><canvas id="previewMini"></canvas></div>
<div class="pv-full" id="pvFull" onclick="if(event.target===this)closePvFull()"><button class="pv-full-close" onclick="closePvFull()">✕</button><canvas id="previewFull"></canvas></div>
<canvas id="exportCanvas" style="display:none"></canvas>
<div class="ie-overlay" id="ieOverlay">
  <div class="ie-modal">
    <div class="ie-header"><h2 id="ieTitle">🖼️ 이미지 편집</h2><button class="ie-close" onclick="closeImageEditor()">✕</button></div>
    <div class="ie-toolbar" id="ieToolbar">
      <button class="ie-tool-btn active" data-tool="crop" onclick="ieTool('crop')">✂️ 크롭</button>
      <button class="ie-tool-btn" data-tool="blur" onclick="ieTool('blur')">💧 블러</button>
      <button class="ie-tool-btn" data-tool="mosaic" onclick="ieTool('mosaic')">🔲 모자이크</button>
      <button class="ie-tool-btn" data-tool="sticker" onclick="ieTool('sticker')">🩹 스티커</button>
      <button class="ie-tool-btn" data-tool="filter" onclick="ieTool('filter')">🎛️ 필터</button>
      <div class="ie-separator"></div>
      <button class="ie-btn-sm" onclick="ieUndo()" title="되돌리기">↩</button>
      <button class="ie-btn-sm danger" onclick="ieReset()">🗑 초기화</button>
      <div class="ie-opts" id="ieOpts"></div>
    </div>
    <div class="ie-canvas-wrap" id="ieCanvasWrap"><canvas id="ieCanvas"></canvas></div>
    <div class="ie-footer"><button class="ie-btn ie-btn-cancel" onclick="closeImageEditor()">취소</button><button class="ie-btn ie-btn-apply" onclick="ieApply()">✅ 적용</button></div>
  </div>
</div>
<input type="file" id="stickerFileInput" accept="image/*" multiple style="display:none">
<script>
/* ===== THEME MODE (dark/light) ===== */
function setThemeMode(mode){
  localStorage.setItem('siteTheme',mode);
  document.querySelectorAll('#tmDark,#tmLight').forEach(b=>b.classList.remove('active'));
  document.getElementById(mode==='dark'?'tmDark':'tmLight').classList.add('active');
  document.documentElement.setAttribute('data-theme',mode);
}
(function(){
  const saved=localStorage.getItem('siteTheme')||(window.matchMedia('(prefers-color-scheme:light)').matches?'light':'dark');
  setThemeMode(saved);
})();

/* ===== CARD MAKER ===== */
const CARD_W=1080;let currentLang="ko";
const I18N={

function rebuildSelectors(){

  ["ratingRow","starSelectRow","heartSelectRow"].forEach((id,gi)=>{
    const el=document.getElementById(id),arr=gi===0?d.ratings:gi===1?d.stars:d.hearts,kArr=gi===0?I18N.ko.ratings:gi===1?I18N.ko.stars:I18N.ko.hearts,stKey=gi===0?"ageRating":gi===1?"starRating":"eroRating";

function drawRR(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function wrapLines(ctx,t,mW){const ls=[];for(const p of t.split("\n")){if(!p.trim()){ls.push("");continue;}let l="";for(const c of p){const x=l+c;if(ctx.measureText(x).width>mW&&l.length){ls.push(l);l=c;}else l=x;}if(l)ls.push(l);}return ls;}
function drawWrap(ctx,t,x,y,mW,lh,mL){const a=wrapLines(ctx,t,mW),ls=a.slice(0,mL);if(a.length>mL)ls[mL-1]=ls[mL-1].slice(0,-2)+"…";for(let i=0;i<ls.length;i++)ctx.fillText(ls[i],x,y+i*lh);return ls.length;}
function getV(){return{title:document.getElementById("inTitle").value,circle:document.getElementById("inCircle").value,artist:document.getElementById("inArtist").value,genre:document.getElementById("inGenre").value,review:document.getElementById("inReview").value,reviewer:document.getElementById("inReviewer").value};}
function formatTime(s){const m=Math.floor(s/60),ss=Math.floor(s%60);return m+":"+(ss<10?"0":"")+ss;}
function calcH(){const o=document.createElement("canvas");o.width=CARD_W;o.height=2000;const c=o.getContext("2d"),v=getV(),rW=CARD_W-160;c.font="400 24px 'Pretendard',sans-serif";const rl=wrapLines(c,'"'+v.review+'"',rW);return Math.max(720,Math.min(1400,Math.ceil((52+400+50+36+Math.min(rl.length,8)*38+120)/10)*10));}
function resolveReviewColor(t,isL){
  if(state.reviewColor==="auto")return t.text;
  if(state.reviewColor==="#ffffff"||state.reviewColor==="#000000")return state.reviewColor+(isL?"c0":"e0");
  return state.reviewColor;
}
function drawCard(ctx,W,H){
  const t=THEME_MAP[state.themeKey],v=getV(),isL=state.themeKey==="white",prog=state.progress;
  const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,t.bg1);bg.addColorStop(1,t.bg2);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);ctx.globalAlpha=isL?.015:.03;for(let i=0;i<2000;i++){ctx.fillStyle=isL?"#000":"#fff";ctx.fillRect(Math.random()*W,Math.random()*H,1.5,1.5);}ctx.globalAlpha=1;
  const ts=380,tx=60,ty=52;ctx.save();drawRR(ctx,tx,ty,ts,ts,20);ctx.clip();
  if(state.thumbImg){const img=state.thumbImg,sc=Math.max(ts/img.width,ts/img.height),sw=img.width*sc,sh=img.height*sc;ctx.drawImage(img,tx+(ts-sw)/2,ty+(ts-sh)/2,sw,sh);}
  else{ctx.fillStyle=isL?"rgba(0,0,0,0.06)":"rgba(255,255,255,0.06)";ctx.fillRect(tx,ty,ts,ts);ctx.fillStyle=t.sub;ctx.font="500 18px 'Pretendard',sans-serif";ctx.textAlign="center";ctx.fillText(I18N[currentLang].canvasThumb,tx+ts/2,ty+ts/2);ctx.textAlign="left";}
  ctx.restore();drawRR(ctx,tx,ty,ts,ts,20);ctx.strokeStyle=isL?"rgba(0,0,0,0.1)":"rgba(255,255,255,0.12)";ctx.lineWidth=1.5;ctx.stroke();
  const rX=tx+ts+44,rW=W-rX-60,rCX=rX+rW/2,tTop=ty+24;
  ctx.font="700 30px 'Pretendard',sans-serif";
  ctx.fillStyle=resolveReviewColor(t,isL);
  ctx.textAlign="left";const tl=drawWrap(ctx,v.title,rX,tTop,rW,38,2);const aT=tTop+tl*38+4;
  ctx.font="500 19px 'Pretendard',sans-serif";ctx.fillStyle=t.sub;ctx.fillText(v.circle+" / "+v.artist,rX,aT);
  const iY=aT+32,badge=state.ageRating;let sX=rX;
  if(badge!=="선택안함"){ctx.font="600 13px 'Pretendard',sans-serif";const bt=currentLang==="ja"?I18N.ja.ratings[I18N.ko.ratings.indexOf(badge)]:badge;const bW=ctx.measureText(bt).width+14;drawRR(ctx,rX,iY-13,bW,21,5);if(badge==="전연령")ctx.fillStyle="#2ecc71";else if(badge==="R15")ctx.fillStyle="#e67e22";else if(badge==="R18")ctx.fillStyle="#e74c3c";ctx.fill();ctx.fillStyle="#fff";ctx.fillText(bt,rX+7,iY+2);sX=rX+bW+10;}
  ctx.font="600 17px 'Pretendard',sans-serif";ctx.fillStyle=t.accent;ctx.fillText(v.genre,sX,iY+2);
  const scY=iY+34;let dX=rX;
  if(state.starRating!=="선택안함"){ctx.font="18px sans-serif";ctx.fillStyle="#ffb432";ctx.fillText("⭐",dX,scY);ctx.font="600 17px 'Pretendard',sans-serif";ctx.fillStyle=t.text;ctx.fillText(state.starRating,dX+24,scY-1);dX+=24+ctx.measureText(state.starRating).width+12;}
  if(state.eroRating!=="선택안함"){const hc=parseInt(state.eroRating.replace("❤ ",""));if(state.starRating!=="선택안함"){ctx.font="500 14px 'Pretendard',sans-serif";ctx.fillStyle=isL?"rgba(0,0,0,0.2)":"rgba(255,255,255,0.25)";ctx.fillText("|",dX,scY-2);dX+=16;}ctx.font="18px sans-serif";ctx.fillStyle="#ff6b6b";let hs="";for(let i=0;i<hc;i++)hs+="♥";ctx.fillText(hs,dX,scY);}
  const bY=ty+260;drawRR(ctx,rX,bY,rW,6,3);ctx.fillStyle=t.progressBg;ctx.fill();drawRR(ctx,rX,bY,rW*prog,6,3);ctx.fillStyle=t.progressFill;ctx.fill();ctx.beginPath();ctx.arc(rX+rW*prog,bY+3,8,0,Math.PI*2);ctx.fillStyle=isL?"#1a1a2a":"#fff";ctx.fill();
  const dur=1200,cur=dur*prog,rem=dur-cur;ctx.font="500 15px 'Pretendard',monospace,sans-serif";ctx.fillStyle=t.sub;ctx.textAlign="left";ctx.fillText(formatTime(cur),rX,bY+28);ctx.textAlign="right";ctx.fillText("-"+formatTime(rem),rX+rW,bY+28);
  const ctY=bY+76;ctx.textAlign="center";ctx.fillStyle=t.ctrl;ctx.font="500 34px 'Pretendard',sans-serif";ctx.fillText("◀",rCX-70,ctY);drawRR(ctx,rCX-13,ctY-25,9,30,3);ctx.fill();drawRR(ctx,rCX+4,ctY-25,9,30,3);ctx.fill();ctx.fillText("▶",rCX+70,ctY);ctx.textAlign="left";
  const rvY=ty+ts+36,rvX=80,rvW=W-160;let cY=rvY;
  ctx.strokeStyle=isL?"rgba(0,0,0,0.1)":"rgba(255,255,255,0.12)";ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(rvX,cY);ctx.lineTo(rvX+rvW,cY);ctx.stroke();cY+=40;
  ctx.font="400 24px 'Pretendard',sans-serif";ctx.fillStyle=resolveReviewColor(t,isL);
  const rl=wrapLines(ctx,'"'+v.review+'"',rvW);const dc=Math.min(rl.length,8);for(let i=0;i<dc;i++)ctx.fillText(rl[i],rvX,cY+i*40);cY+=dc*40+36;
  ctx.font="500 20px 'Pretendard',sans-serif";ctx.fillStyle=isL?"rgba(0,0,0,0.6)":"rgba(255,255,255,0.65)";ctx.textAlign="right";ctx.fillText("— "+v.reviewer,rvX+rvW,cY);ctx.textAlign="left";
  ctx.fillStyle=t.accent;drawRR(ctx,rvX,cY+30,50,5,2.5);ctx.fill();
}
function renderPreview(){const c=document.getElementById("preview"),H=calcH();c.width=CARD_W;c.height=H;drawCard(c.getContext("2d"),CARD_W,H);}
function updateAll(){
  themeSelect.value=state.themeKey;
  document.getElementById("ratingRow").querySelectorAll(".rating-btn").forEach((b,i)=>{const v=I18N.ko.ratings[i];let c="rating-btn";if(v===state.ageRating){if(v==="선택안함")c+=" active-none";else if(v==="전연령")c+=" active-all";else if(v==="R15")c+=" active-r15";else if(v==="R18")c+=" active-r18";}b.className=c;});
  document.getElementById("starSelectRow").querySelectorAll(".rating-btn").forEach((b,i)=>b.className="rating-btn"+(I18N.ko.stars[i]===state.starRating?" active-none":""));
  document.getElementById("heartSelectRow").querySelectorAll(".rating-btn").forEach((b,i)=>b.className="rating-btn"+(I18N.ko.hearts[i]===state.eroRating?" active-none":""));
  colorGrid.querySelectorAll(".color-swatch").forEach(s=>s.className="color-swatch"+(s.dataset.hex===state.reviewColor?" active":""));
  document.getElementById("headerTitle").style.color=THEME_MAP[state.themeKey].accent;
  const ta=document.getElementById("thumbActions");
  if(!state.thumbImg){document.getElementById("thumbLabel").textContent=I18N[currentLang].thumbIn;ta.classList.remove("show");}
  else{document.getElementById("thumbLabel").innerHTML='<img src="'+state.thumbUrl+'" class="thumb-preview"><span style="font-size:12px;color:'+THEME_MAP[state.themeKey].accent+'">'+I18N[currentLang].thumbChange+'</span>';ta.classList.add("show");}
  const t=THEME_MAP[state.themeKey];document.getElementById("exportBtn").style.background="linear-gradient(135deg,"+t.accent+","+t.bg1+")";document.getElementById("thumbBox").style.borderColor=t.accent+"40";
  renderPreview();
}
function removeThumb(){state.thumbImg=null;state.thumbUrl=null;state.originalImg=null;document.getElementById("fileInput").value="";updateAll();}
function exportImage(){
  const c=document.getElementById("exportCanvas"),H=calcH();c.width=CARD_W;c.height=H;drawCard(c.getContext("2d"),CARD_W,H);
  const sfx=currentLang==="ja"?"review-ja":"review-ko",fname="voice-drama-"+sfx+"-"+Date.now()+".png";
  c.toBlob(async blob=>{
    const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&/Macintosh/i.test(navigator.userAgent));
    if(isMobile&&navigator.canShare){const file=new File([blob],fname,{type:"image/png"});if(navigator.canShare({files:[file]})){try{await navigator.share({files:[file]});return;}catch(e){if(e.name==="AbortError")return;}}}
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname;document.body.appendChild(a);a.click();document.body.removeChild(a);
  },"image/png");
}

function openImageEditor(){
  if(!state.originalImg)return;
  document.getElementById("ieOverlay").classList.add("open");
  ie.originalImg=state.originalImg;ie.history=[];ie.historyIdx=-1;ie.stickers=[];
  ie.crop={active:false,sx:0,sy:0,ex:0,ey:0};ie.filter={blur:0,mosaic:0,gray:0};ie.filterBase=null;
  const tmp=document.createElement("canvas");tmp.width=ie.originalImg.width;tmp.height=ie.originalImg.height;
  tmp.getContext("2d").drawImage(ie.originalImg,0,0);
  iePushHistory(tmp);ieTool("crop");ieRender();

    const px=Math.max(1,Math.round(f.blur/100*30));

      for(let yy=by;yy<Math.min(by+bs,sh);yy++){for(let xx=bx;xx<Math.min(bx+bs,sw);xx++){const idx=(yy*sw+xx)*4;rr+=imgD.data[idx];gg+=imgD.data[idx+1];bb+=imgD.data[idx+2];aa+=imgD.data[idx+3];cnt++;}}

function doCrop(){

document.getElementById("stickerFileInput").addEventListener("change",e=>{
  const files=e.target.files;if(!files.length)return;
  Array.from(files).forEach(f=>{const u=URL.createObjectURL(f);const img=new Image();img.onload=()=>{const src=ieGetCurrent();const md=Math.min(src.width,src.height)*0.3,asp=img.width/img.height;
    ie.stickers.push({img,x:src.width/2-md/2,y:src.height/2-md/asp/2,w:md,h:md/asp});ieRender();};img.src=u;});e.target.value="";

function ieApply(){
