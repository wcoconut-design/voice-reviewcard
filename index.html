<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Review Card Maker</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
/* ===== 사이트 테마 CSS 변수 (다크/라이트) ===== */
[data-theme="dark"]{--bg:#0c0c14;--surface:#16161e;--input:#1e1e2a;--border:rgba(255,255,255,0.08);--text:#e0e0e8;--sub:#6a6a80;--muted:#4e4e66;--accent:#a8c8e8;--scrollbar:rgba(255,255,255,0.15);--shadow:rgba(0,0,0,0.4);--active-text:#fff;--overlay:rgba(0,0,0,0.85)}
[data-theme="light"]{--bg:#f0f0f5;--surface:#fff;--input:#ededf3;--border:rgba(0,0,0,0.09);--text:#1a1a2e;--sub:#7a7a90;--muted:#a8a8be;--accent:#5a7a9a;--scrollbar:rgba(0,0,0,0.12);--shadow:rgba(0,0,0,0.06);--active-text:#1a1a2e;--overlay:rgba(0,0,0,0.45)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);font-family:'Pretendard',-apple-system,sans-serif;color:var(--text);transition:background .3s,color .3s;overflow:hidden}
.wrap{height:100vh;max-width:1280px;margin:0 auto;padding:12px 18px;display:flex;flex-direction:column;gap:10px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.brand{display:flex;align-items:baseline;gap:10px;min-width:0;overflow:hidden}
.brand h1{font-size:15px;font-weight:800;letter-spacing:-0.01em;white-space:nowrap}
.brand p{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-group{display:flex;gap:4px;align-items:center;flex-shrink:0}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.t-btn{padding:5px 12px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;background:var(--input);color:var(--sub);border:1px solid var(--border);transition:all .2s}
.t-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.t-btn-sm{padding:3px 9px;font-size:13px;line-height:1}
.layout{flex:1;display:grid;grid-template-columns:1fr 1.25fr;gap:20px;min-height:0}
@media(max-width:900px){
  body{overflow:auto}
  .wrap{height:auto;min-height:100vh;padding:12px 14px 72px}
  .layout{grid-template-columns:1fr;display:flex;flex-direction:column;gap:12px;overflow:visible}
  .preview-wrap{order:-1;position:sticky;top:0;background:var(--bg);padding:6px 0 10px;z-index:10;border-bottom:1px solid var(--border);align-items:center}
  #preview{max-height:42vh;width:auto;max-width:100%}
  .editor{overflow:visible;min-height:auto;flex:none}
  .btn-row{position:fixed!important;bottom:0;left:0;right:0;border-radius:0;padding:10px 16px calc(10px + env(safe-area-inset-bottom));background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -4px 20px var(--shadow);z-index:40;margin:0}
  body[data-pv-mode="float"] .preview-wrap{display:none}
  body[data-pv-mode="float"] .pv-mini{display:flex}
  body[data-pv-mode="float"] .wrap{padding-bottom:72px}
  .pv-mode-switch{display:flex}
}
@media(max-width:600px){
  .editor-grid{grid-template-columns:1fr;gap:10px}
  input[type=text],select,textarea{padding:8px 11px;font-size:14px}
  .rating-btn{padding:7px 0;font-size:11px}
  .thumb-act-btn{width:52px;padding:6px 8px}
}
.pv-mode-switch{display:none;gap:3px;align-items:center}
.pv-mode-switch .t-btn{padding:5px 9px;font-size:13px}
.pv-mini{display:none;position:fixed;bottom:18px;right:18px;width:108px;height:78px;border-radius:12px;background:var(--surface);box-shadow:0 10px 30px var(--shadow);border:1.5px solid var(--accent);cursor:pointer;z-index:50;overflow:hidden;align-items:center;justify-content:center;padding:5px;transition:transform .2s ease,box-shadow .2s ease}
.pv-mini:hover,.pv-mini:active{transform:scale(1.05);box-shadow:0 14px 36px var(--shadow)}
.pv-mini canvas{max-width:100%;max-height:100%;display:block;border-radius:6px}
.pv-mini::after{content:"⛶";position:absolute;top:4px;right:4px;font-size:10px;color:#fff;background:rgba(0,0,0,0.55);width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700}
.pv-full{display:none;position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(8px);z-index:9500;justify-content:center;align-items:center;padding:20px;flex-direction:column;gap:10px;opacity:0;transition:opacity .25s ease}
.pv-full.open{display:flex;opacity:1}
.pv-full canvas{max-width:100%;max-height:calc(100vh - 100px);border-radius:14px;box-shadow:0 14px 50px var(--shadow);display:block;transform:translateY(8px);transition:transform .25s ease}
.pv-full.open canvas{transform:translateY(0)}
.pv-full-close{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:flex-end;box-shadow:0 4px 12px var(--shadow)}
/* 에디터 내부 패딩 넓히기 에디터 박스 자체의 스크롤바 유연하게 대처 */
.editor{background:var(--surface);border-radius:14px;padding:16px 20px;border:1px solid var(--border);overflow-y:auto;transition:background .3s;height:100%;box-sizing:border-box;display:flex;flex-direction:column;scrollbar-width:thin}
.editor::-webkit-scrollbar{width:6px}.editor::-webkit-scrollbar-track{background:transparent}.editor::-webkit-scrollbar-thumb{background-color:var(--scrollbar);border-radius:3px}
/* 인풋 창들 사이의 상하좌우 간격도 패딩에 맞춰 넓히기 상하 여백에 맞춰 내부 그리드가 튀어나가지 않게 다듬기 */
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;flex:none}
.editor-grid .full{grid-column:1/-1}
  
/* 인풋 폼 스타일 (통합) */
input[type=text],select,textarea{width:100%;background:var(--input);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-size:12px;color:var(--text);font-family:inherit;outline:none;transition:all .2s ease}
textarea{resize:none;line-height:1.5;overflow:hidden;min-height:80px}
::placeholder{color:var(--muted)}

/* 클릭 시 부드럽고 은은한 네온 효과 */
input[type=text]:focus, select:focus, textarea:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px rgba(168, 200, 232, 0.2);
  background: var(--input);
}

.preview-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;min-width:0;gap:8px}
.pv-nav{display:none;align-items:center;gap:12px;padding:4px 0}
.pv-nav.show{display:flex}
.pv-nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pv-nav-btn:hover{background:var(--accent);color:var(--bg)}
.pv-nav-btn:disabled{opacity:0.3;cursor:default;background:var(--input);color:var(--sub)}
.pv-nav-ind{font-size:12px;font-weight:700;color:var(--sub);min-width:40px;text-align:center}
#preview{max-height:calc(100vh - 60px);max-width:100%;width:auto;height:auto;border-radius:14px;box-shadow:0 8px 40px var(--shadow);display:block}
label{display:block;font-size:10px;font-weight:600;color:var(--sub);margin-bottom:2px;letter-spacing:-0.01em}
.field{margin:0}
.thumb-row{display:flex;gap:6px;align-items:stretch}
.thumb-box{border:1.5px dashed var(--border);border-radius:9px;padding:6px 8px;text-align:center;cursor:pointer;background:var(--input);display:flex;align-items:center;justify-content:center;gap:2px;min-height:48px;flex:1;min-width:0;flex-direction:column;transition:border-color .2s,background .2s}
.thumb-row:has(.thumb-actions.show) .thumb-box{flex:1 1 auto;padding:6px;flex-direction:row;gap:8px}
.thumb-box span{font-size:12px;color:var(--sub)}
.thumb-hint{font-size:10px!important;color:var(--muted)!important;font-weight:500;opacity:0.7;letter-spacing:-0.01em}
.thumb-box.drag-over{border-color:var(--accent)!important;border-style:solid;background:rgba(168,200,232,0.08)}
.thumb-preview{width:32px;height:32px;border-radius:5px;object-fit:cover}
.thumb-row:has(.thumb-actions.show) .thumb-preview{width:88px;height:88px;border-radius:8px}
.thumb-row:has(.thumb-actions.show) #thumbLabel>span{display:none}
.thumb-actions{display:none;gap:4px;flex:0 1 auto;align-items:stretch}
.thumb-actions.show{display:flex}
.thumb-act-btn{flex:0 0 auto;padding:4px 6px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;background:var(--input);color:var(--accent);border:1px solid rgba(128,160,200,0.2);text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;line-height:1.2;white-space:nowrap;flex-direction:column;gap:2px;width:46px}
.thumb-act-btn .ic{font-size:16px;line-height:1}
.thumb-act-btn .tx{font-size:9px;font-weight:600}
.thumb-act-btn:hover{opacity:.8}
.thumb-act-del{color:#e74c3c;border-color:rgba(231,76,60,0.25)}.thumb-act-del:hover{background:rgba(231,76,60,0.08)}
.rating-row{display:flex;gap:3px}
.rating-btn{flex:1;padding:4px 0;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:var(--input);color:var(--sub);border:1px solid var(--border);text-align:center;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rating-btn.active-none{border:1.5px solid #718093;background:rgba(113,128,147,0.15);color:var(--active-text)}
.rating-btn.active-all{border:1.5px solid #2ecc71;background:rgba(46,204,113,0.15);color:var(--active-text)}
.rating-btn.active-r15{border:1.5px solid #e67e22;background:rgba(230,126,34,0.15);color:var(--active-text)}
.rating-btn.active-r18{border:1.5px solid #e74c3c;background:rgba(231,76,60,0.15);color:var(--active-text)}
.export-btn{padding:8px 0;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;color:#fff}
.btn-row{display:flex;gap:6px;align-items:stretch;position:sticky;bottom:0;background:var(--surface);padding:10px 0 2px;z-index:5;border-top:1px solid var(--border);margin-top:6px}
.reset-btn{padding:9px 14px;border:1px solid var(--border);border-radius:9px;font-size:13px;cursor:pointer;background:var(--input);color:var(--sub);transition:all .15s}
.reset-btn:hover{background:rgba(231,76,60,0.1);color:#e74c3c;border-color:rgba(231,76,60,0.3)}
.color-grid{display:flex;gap:4px;flex-wrap:wrap;background:var(--input);padding:5px;border-radius:7px;border:1px solid var(--border)}
.color-swatch{width:17px;height:17px;border-radius:4px;cursor:pointer;border:1px solid rgba(0,0,0,0.15);transition:transform .15s,box-shadow .15s}
.color-swatch.active{border:2.5px solid var(--accent);box-shadow:0 0 0 3px rgba(168,200,232,0.35),0 0 8px var(--shadow);transform:scale(1.15);position:relative}
.color-swatch.active::before{content:"✓";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,0.6)}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch-auto{background:conic-gradient(from 45deg,#fff 0deg 90deg,#444 90deg 180deg,#fff 180deg 270deg,#444 270deg 360deg) !important;position:relative}
.color-swatch-auto::after{content:"A";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--accent);background:var(--input);border-radius:50%;width:11px;height:11px;margin:auto;line-height:1}
.editor-credit{text-align:center;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:6px}
.check-label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;margin:0}
.check-label input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.pv-overflow{display:none;padding:7px 12px;border-radius:7px;font-size:11px;font-weight:600;background:rgba(230,126,34,0.12);color:#e67e22;border:1px solid rgba(230,126,34,0.25);text-align:center}
.pv-overflow.show{display:block}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;background:transparent;cursor:pointer;outline:none;padding:6px 0}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:var(--input);border:1px solid var(--border)}
input[type=range]::-moz-range-track{height:4px;border-radius:2px;background:var(--input);border:1px solid var(--border)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);box-shadow:0 1px 4px var(--shadow);margin-top:-7px;transition:transform .15s ease,box-shadow .15s ease}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);box-shadow:0 1px 4px var(--shadow);transition:transform .15s ease,box-shadow .15s ease}
input[type=range]:hover::-webkit-slider-thumb,input[type=range]:active::-webkit-slider-thumb{transform:scale(1.2);box-shadow:0 2px 8px var(--shadow)}
input[type=range]:hover::-moz-range-thumb,input[type=range]:active::-moz-range-thumb{transform:scale(1.2);box-shadow:0 2px 8px var(--shadow)}
/* ===== 이미지 에디터 모달 오버레이 ===== */
.ie-overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:9999;justify-content:center;align-items:center;backdrop-filter:blur(8px);opacity:0;transition:opacity .2s ease;overflow:hidden;touch-action:none}
.ie-overlay.open{display:flex;opacity:1}
.ie-modal{background:var(--surface);border-radius:18px;border:1px solid var(--border);width:95vw;max-width:720px;max-height:95vh;max-height:95dvh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 60px var(--shadow)}
.ie-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;flex-shrink:0}
.ie-header h2{font-size:14px;font-weight:700;letter-spacing:-0.01em}
.ie-close{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--sub);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.ie-close:hover{background:var(--input);color:var(--text)}
.ie-toolbar{display:flex;gap:2px;padding:4px 14px 10px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.ie-tool-btn{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--sub);border:none;transition:background .15s,color .15s;white-space:nowrap}
.ie-tool-btn:hover{color:var(--text);background:var(--input)}
.ie-tool-btn.active{background:var(--input);color:var(--accent)}
.ie-separator{width:1px;height:18px;background:var(--border);margin:0 6px;opacity:.6}
.ie-opts{display:none;align-items:center;gap:8px;padding:0 14px 10px;flex-wrap:wrap;flex-shrink:0}
.ie-opts.has-content{display:flex}
.ie-opts label{font-size:11px;color:var(--sub);margin:0;font-weight:600}
.ie-opts input[type=range]{width:88px;padding:6px 0}
.ie-opts span{font-size:11px;color:var(--accent);font-weight:700;min-width:32px;text-align:right}
/* 블러/모자이크 슬라이더 그룹 — 데스크탑: 한줄 인라인 */
.ie-slider-group{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.ie-opts.ie-opts-sliders{display:grid;grid-template-columns:1fr 1fr;gap:6px 16px;align-items:center}
.ie-opts-sliders>.ie-slider-group{display:contents}
.ie-opts-sliders .ie-slider-divider{grid-column:1/-1;height:1px;background:var(--border);margin:2px 0}
.ie-opts-sliders .ie-slider-row{display:flex;align-items:center;gap:6px;width:100%}
.ie-opts-sliders .ie-slider-row label{min-width:62px;flex-shrink:0;font-size:11px;white-space:nowrap}
.ie-opts-sliders .ie-slider-row input[type=range]{flex:1;min-width:0}
.ie-slider-row{display:flex;align-items:center;gap:6px}
.ie-slider-row label{min-width:34px;flex-shrink:0;margin:0;font-size:11px;color:var(--sub);font-weight:600;white-space:nowrap}
.ie-slider-row input[type=range]{width:80px}
.ie-slider-row span{font-size:11px;color:var(--accent);font-weight:700;min-width:32px;text-align:right}
.ie-slider-divider{width:1px;height:18px;background:var(--border);margin:0 4px;opacity:.6}
.ie-canvas-wrap{flex:1;overflow:auto;display:flex;justify-content:center;align-items:center;padding:20px;position:relative;min-height:0;background:radial-gradient(ellipse at 50% 35%,rgba(255,255,255,0.04),transparent 70%),var(--bg)}
.ie-canvas-wrap canvas{border-radius:10px;cursor:crosshair;max-width:100%;max-height:100%;touch-action:none;box-shadow:0 8px 28px rgba(0,0,0,0.32),0 0 0 1px var(--border)}
.ie-opts,.ie-opts input[type=range],.ie-filter-panel,.ie-filter-panel input[type=range]{touch-action:auto!important}
/* ===== 모바일(600px 이하) 이미지 에디터 대응 — 풀스크린 모달 + 옵션 바텀시트 ===== */
@media(max-width:600px){
  .ie-overlay{align-items:stretch}
  .ie-modal{max-height:none;height:100vh;height:100dvh;border-radius:0;width:100vw;max-width:100vw;border:none}
  .ie-header{padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top));flex-shrink:0}
  .ie-header h2{font-size:13px}
  .ie-toolbar{padding:2px 8px 8px;gap:0;justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;flex-shrink:0}
  .ie-toolbar::-webkit-scrollbar{display:none}
  .ie-tool-btn{padding:6px 9px;font-size:11px;flex-shrink:0}
  .ie-separator{margin:0 3px;flex-shrink:0}
  .ie-canvas-wrap{padding:14px;padding-bottom:calc(74px + env(safe-area-inset-bottom));min-height:0;flex:1;overflow:hidden}
  .ie-canvas-wrap canvas{max-height:100%;box-shadow:0 4px 16px rgba(0,0,0,0.3),0 0 0 1px var(--border)}
  .ie-footer{position:fixed;left:0;right:0;bottom:0;z-index:10020;margin:0;background:var(--surface);border-top:1px solid var(--border);box-shadow:0 -4px 20px var(--shadow);padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));flex-shrink:0}
  .ie-btn{padding:8px 18px;font-size:12px}
  .ie-filter-panel{padding:6px 14px 10px;gap:4px 10px;grid-template-columns:1fr}
  .ie-filter-cell label{min-width:30px;font-size:10px}
  .ie-filter-cell span{min-width:26px;font-size:10px}
  .ie-filter-cell input[type=range],.ie-opts input[type=range]{height:36px;padding:8px 0;cursor:pointer}
}
.ie-footer{display:flex;gap:8px;padding:12px 18px;justify-content:space-between;align-items:center;flex-shrink:0}
.ie-foot-right{display:flex;gap:8px;align-items:center}
.ie-btn{white-space:nowrap}
.ie-btn-save{background:var(--input);color:var(--accent)}
.ie-btn-save:hover{filter:brightness(1.06);box-shadow:0 4px 14px var(--shadow)}
.ie-btn{padding:9px 22px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;border:none;transition:background .15s,opacity .15s,box-shadow .15s}
.ie-btn-cancel{background:transparent;color:var(--sub)}.ie-btn-cancel:hover{background:var(--input);color:var(--text)}
.ie-btn-apply{background:var(--accent);color:var(--bg)}.ie-btn-apply:hover{filter:brightness(1.08);box-shadow:0 4px 14px var(--shadow)}
.ie-btn-sm{padding:6px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--sub);transition:background .15s,color .15s;white-space:nowrap;flex-shrink:0}
.ie-btn-sm:hover{background:var(--input);color:var(--text)}
.ie-btn-sm.active{background:var(--input);color:var(--accent)}
.ie-btn-sm.danger{color:#e74c3c}
.ie-btn-sm.danger:hover{background:rgba(231,76,60,0.08);color:#e74c3c}
.ie-crop-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:#fff;font-size:11px;padding:5px 12px;border-radius:14px;pointer-events:none;white-space:nowrap;font-weight:500}

<script>
/* ===== THEME MODE (dark/light) ===== */
function setThemeMode(mode, isUserClick = true){
  // 사용자가 직접 버튼을 클릭했을 때만 세션을 저장
  if (isUserClick) {
    localStorage.setItem('siteTheme', mode);
  }
  document.querySelectorAll('#tmDark,#tmLight').forEach(b=>b.classList.remove('active'));
  const targetBtn = document.getElementById(mode==='dark'?'tmDark':'tmLight');
  if (targetBtn) targetBtn.classList.add('active');
  document.documentElement.setAttribute('data-theme', mode);
}

(function(){
  // 1. 기존 사용자의 수동 테마 지정 기록이 있는지 확인
  let saved = localStorage.getItem('siteTheme');
  
  // 2. 기록이 없다면 디바이스 시스템의 설정을 확인 (다크/라이트)
  if (!saved) {
    const isSystemLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    saved = isSystemLight ? 'light' : 'dark';
  }
  
  // 3. 첫 로드이므로 수동 저장이 안 되게 false를 주어 테마 적용
  setThemeMode(saved, false);
})();

// 페이지를 켜둔 상태에서 디바이스 시스템 테마가 바뀌면 실시간으로 연동 (수동 고정 안 했을 때만)
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if (!localStorage.getItem('siteTheme')) {
    setThemeMode(e.matches ? 'dark' : 'light', false);
  }
});
/* ===== CARD MAKER ===== */
const CARD_W=1080;let currentLang="ko";  // 저장 해상도: 기본 1080px / 고화질 2160px(2배) — 레이아웃 동일, 픽셀만 촘촘
const I18N={
  ko:{
    title:"🎧 Voice Drama Review Card",

    theme:"테마",
    thumb:"썸네일",
    thumbIn:"클릭하여 업로드",
    thumbHint:"드래그 · 붙여넣기(Ctrl+V) 가능",

// 파일 등록 이벤트 (메모리 누수 차단)
// 썸네일 이미지 로딩 (파일 선택/드래그/붙여넣기 공통) — Blob URL 중복 정리 포함
const THUMB_MAX=1200; // 업로드 이미지 긴 변 최대 px (메모리/성능 최적화)
function loadThumb(f){
  if(!f||!f.type.startsWith("image/"))return;
  if(state.thumbUrl&&state.thumbUrl.startsWith('blob:'))URL.revokeObjectURL(state.thumbUrl);
  const u=URL.createObjectURL(f);
  let img=new Image();
  img.onload=()=>{
    img.onload=img.onerror=null;       // 핸들러 1회만 (중복 호출 방지)
    const long=Math.max(img.width,img.height);
    let useImg=img;
    if(long>THUMB_MAX){
      const sc=THUMB_MAX/long;
      const cv=document.createElement("canvas");
      cv.width=Math.round(img.width*sc);cv.height=Math.round(img.height*sc);
      const cx=cv.getContext("2d");cx.imageSmoothingEnabled=true;cx.imageSmoothingQuality="high";
      cx.drawImage(img,0,0,cv.width,cv.height);
      useImg=cv;                       // 축소된 캔버스를 작업 원본으로 사용
      URL.revokeObjectURL(u);          // 원본 blob URL 즉시 해제
      state.thumbUrl=cv.toDataURL("image/jpeg",0.85); // 라벨 미리보기용 축소 dataURL
      img.src="";img=null;             // 원본 디코드 이미지 참조 해제 → GC 유도 (메모리 절약)
    } else { state.thumbUrl=u; }
    state.originalImg=useImg;state.thumbImg=useImg;updateAll();
  };
  img.onerror=()=>{img.onload=img.onerror=null;URL.revokeObjectURL(u);img=null;};
  img.src=u;
}

// 에디터 본체 Undo/Redo (전체 state 스냅샷 기반)
const _undoStack=[],_redoStack=[];let _undoTimer=null,_skipUndo=false;
function captureEditorState(){
  return JSON.stringify({themeKey:state.themeKey,starRating:state.starRating,eroRating:state.eroRating,ageRating:state.ageRating,progress:state.progress,reviewColor:state.reviewColor,showDate:state.showDate,spoiler:state.spoiler,fontSize:state.fontSize,qrUrl:state.qrUrl,
    title:document.getElementById("inTitle").value,circle:document.getElementById("inCircle").value,artist:document.getElementById("inArtist").value,genre:document.getElementById("inGenre").value,
    review:document.getElementById("inReview").value,reviewer:document.getElementById("inReviewer").value,headline:document.getElementById("inHeadline").value});
}
function pushUndo(){
  clearTimeout(_undoTimer);
  _undoTimer=setTimeout(()=>{
    const snap=captureEditorState();
    if(_undoStack.length===0||_undoStack[_undoStack.length-1]!==snap){_undoStack.push(snap);if(_undoStack.length>50)_undoStack.shift();_redoStack.length=0;}
  },500);
}
function applyEditorState(json){
  _skipUndo=true;
  const d=JSON.parse(json);
  state.themeKey=d.themeKey;state.starRating=d.starRating;state.eroRating=d.eroRating;state.ageRating=d.ageRating;state.progress=d.progress;state.reviewColor=d.reviewColor;state.showDate=d.showDate;state.spoiler=d.spoiler;state.fontSize=d.fontSize;state.qrUrl=d.qrUrl||"";
  document.getElementById("inTitle").value=d.title||"";document.getElementById("inCircle").value=d.circle||"";
  document.getElementById("inArtist").value=d.artist||"";document.getElementById("inGenre").value=d.genre||"";
  document.getElementById("inReview").value=d.review||"";document.getElementById("inReviewer").value=d.reviewer||"";
  document.getElementById("inHeadline").value=d.headline||"";document.getElementById("inQR").value=d.qrUrl||"";
  document.getElementById("progressSlider").value=d.progress;document.getElementById("chkDate").checked=d.showDate;
  document.getElementById("chkSpoiler").checked=d.spoiler;document.getElementById("fontSizeSlider").value=d.fontSize;
  document.getElementById("fontSizeVal").textContent=d.fontSize+"px";
  autoResizeTextarea(reviewTA);rebuildSelectors();updateAll();_skipUndo=false;
}
function editorUndo(){if(_undoStack.length<2)return;_redoStack.push(_undoStack.pop());applyEditorState(_undoStack[_undoStack.length-1]);}
function editorRedo(){if(!_redoStack.length)return;const s=_redoStack.pop();_undoStack.push(s);applyEditorState(s);}
// 초기 스냅샷
setTimeout(()=>_undoStack.push(captureEditorState()),600);

// 기존 input 이벤트에 undo 푸시 연결
const _origInputHandler=()=>{if(!_skipUndo)pushUndo();};

// 둥근 사각형 패스 생성 (fillRect/stroke 전에 호출)
function drawRR(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
// 텍스트를 최대 폭(mW)에 맞게 줄바꿈 배열로 변환
function wrapLines(ctx,t,mW){const ls=[];for(const p of t.split("\n")){if(!p.trim()){ls.push("");continue;}let l="";for(const c of p){const x=l+c;if(ctx.measureText(x).width>mW&&l.length){ls.push(l);l=c;}else l=x;}if(l)ls.push(l);}return ls;}
// 줄바꿈 텍스트 그리기 (최대 mL줄, 초과 시 마지막 줄에 말줄임표)
function drawWrap(ctx,t,x,y,mW,lh,mL){const a=wrapLines(ctx,t,mW),ls=a.slice(0,mL);if(a.length>mL)ls[mL-1]=ls[mL-1].slice(0,-2)+"…";for(let i=0;i<ls.length;i++)ctx.fillText(ls[i],x,y+i*lh);return ls.length;}
function getV(){return{title:document.getElementById("inTitle").value,circle:document.getElementById("inCircle").value,artist:document.getElementById("inArtist").value,genre:document.getElementById("inGenre").value,review:document.getElementById("inReview").value,reviewer:document.getElementById("inReviewer").value,headline:document.getElementById("inHeadline").value};}
function formatTime(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=Math.floor(s%60);if(h>0)return h+":"+(m<10?"0":"")+m+":"+(ss<10?"0":"")+ss;return m+":"+(ss<10?"0":"")+ss;}
function hexToRgba(hex,a){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return"rgba("+r+","+g+","+b+","+a+")";}
// 카드 레이아웃 상수 — 페이지 최대 높이, 최대 페이지 수, 영역별 높이
const MAX_PAGE_H=1000,MAX_PAGES=4,PAGE_PAD_BOTTOM=40,REVIEWER_H=52,DATE_H=28,CONT_TOP_PAD=120,TOP_H=480,REVIEW_GAP=90;
function reviewLH(){return Math.round(state.fontSize*1.58);}
function headlineH(){return document.getElementById("inHeadline").value?40:0;}
function footerH(){const rv=!!document.getElementById("inReviewer").value;const dt=state.showDate;return (rv?30:0)+(dt?DATE_H:0);}
function calcP1H(n){return TOP_H+REVIEW_GAP+headlineH()+n*reviewLH()+footerH()+PAGE_PAD_BOTTOM;}

// [수정 #2] 레이아웃 측정용 캔버스 재사용 (매 호출마다 생성 방지)
const _measureCanvas=document.createElement("canvas");_measureCanvas.width=CARD_W;_measureCanvas.height=100;
const _measureCtx=_measureCanvas.getContext("2d");

/**
 * 리뷰 텍스트의 멀티페이지 레이아웃을 계산한다.
 * 1페이지: 상단 정보(480px) + 리뷰 영역, 2페이지~: 리뷰 이어쓰기 (최대 MAX_PAGES=4)
 * 반환값: { lines:전체줄배열, pages:[{start,count,h}], overflow:잘림여부 }
 */
function getReviewLayout(){
  const c=_measureCtx,v=getV(),rvW=CARD_W-160;
  c.font="400 "+state.fontSize+"px 'Pretendard',sans-serif";
  const allLines=wrapLines(c,v.review||"",rvW);
  const fH=footerH();
  const p1Full=calcP1H(allLines.length||1);
  if(p1Full<=MAX_PAGE_H) return{lines:allLines,pages:[{start:0,count:allLines.length||1,h:p1Full}],overflow:false};
  const p1Max=Math.max(1,Math.floor((MAX_PAGE_H-TOP_H-REVIEW_GAP-headlineH()-fH-PAGE_PAD_BOTTOM)/reviewLH()));
  const contMax=Math.max(1,Math.floor((MAX_PAGE_H-CONT_TOP_PAD-fH-PAGE_PAD_BOTTOM)/reviewLH()));
  const pages=[{start:0,count:Math.min(allLines.length,p1Max),h:MAX_PAGE_H}];
  let used=pages[0].count;
  while(used<allLines.length&&pages.length<MAX_PAGES){
    const rem=allLines.length-used;
    const cnt=Math.min(rem,contMax);
    pages.push({start:used,count:cnt,h:MAX_PAGE_H});
    used+=cnt;
  }
  return{lines:allLines,pages:pages,overflow:used<allLines.length};
}

// 리뷰 텍스트 색상 결정 — "auto"이면 테마/배경 밝기에 따라 흰색 또는 검정, 아니면 사용자 선택 색상
function resolveReviewColor(panelIsDark,t,isL){
  if(state.reviewColor==="auto")return t?t.text:(panelIsDark?"rgba(255,255,255,0.92)":"rgba(0,0,0,0.85)");
  return state.reviewColor;
}

// 카드 배경 렌더링 — 테마별 그라데이션 + 은은한 광원 효과(radialGradient)
function drawBg(ctx,W,H,t,isL,unified,topH){
  const gradH=unified?H:topH;
  const bg=ctx.createLinearGradient(0,0,W,gradH);bg.addColorStop(0,t.bg1);bg.addColorStop(1,t.bg2);ctx.fillStyle=bg;ctx.fillRect(0,0,W,gradH);
  ctx.save();ctx.globalAlpha=isL?.04:.07;
  const g1=ctx.createRadialGradient(W*0.25,topH*0.22,0,W*0.25,topH*0.22,W*0.55);g1.addColorStop(0,"#fff");g1.addColorStop(1,"rgba(255,255,255,0)");ctx.fillStyle=g1;ctx.fillRect(0,0,W,topH);
  const g2=ctx.createRadialGradient(W*0.78,topH*0.85,0,W*0.78,topH*0.85,W*0.5);g2.addColorStop(0,"#fff");g2.addColorStop(1,"rgba(255,255,255,0)");ctx.fillStyle=g2;ctx.fillRect(0,0,W,topH);
  ctx.restore();
}

// 리뷰 하단 작성자/날짜 렌더링 (우측 정렬)
function drawFooter(ctx,v,t,isL,unified,rvX,rvW,H,textEndY){

// QR 코드 캐싱 생성 — 같은 URL이면 캐시된 캔버스 재사용, 새 URL이면 qrcode-generator로 생성
let _qrCache={url:"",img:null};
function genQR(url){
  if(!url)return null;
  if(_qrCache.url===url&&_qrCache.img)return _qrCache.img;
  try{
    const qr=qrcode(0,"M");qr.addData(url);qr.make();
    const size=qr.getModuleCount();
    const quiet=4;                 // 표준 흰 여백(quiet zone) 4모듈 — 스캔 인식률 필수
    const px=10;                   // 모듈당 고해상도 px (선명한 마스터 생성 후 카드에 축소)
    const total=size+quiet*2;
    const cvs=document.createElement("canvas");
    cvs.width=cvs.height=total*px;
    const c=cvs.getContext("2d");
    c.fillStyle="#fff";c.fillRect(0,0,cvs.width,cvs.height);
    c.fillStyle="#000";
    for(let r=0;r<size;r++)for(let col=0;col<size;col++)if(qr.isDark(r,col))c.fillRect((col+quiet)*px,(r+quiet)*px,px,px);
    cvs._modules=total;            // 여백 포함 총 모듈 수 (정수 배율 그리기에 사용)
    _qrCache={url,img:cvs};return cvs;
  }catch(e){return null;}
}
function drawQR(ctx,t,isL,x,y,size){
  const qrImg=genQR(state.qrUrl);if(!qrImg)return;
  // QR 자체에 흰 여백이 포함됨. 모듈 수에 맞춰 정수 px로 떨어지도록 크기 보정해 선명도 확보
  const mods=qrImg._modules||33;
  const draw=Math.max(size, Math.round(size/mods)*mods); // 모듈당 정수 px
  const pad=4,full=draw+pad*2;
  drawRR(ctx,x-pad,y-pad,full,full,8);
  ctx.fillStyle="#fff";ctx.fill();
  ctx.strokeStyle=isL?"rgba(0,0,0,0.12)":"rgba(255,255,255,0.18)";ctx.lineWidth=1;ctx.stroke();
  const _sm=ctx.imageSmoothingEnabled;
  ctx.imageSmoothingEnabled=false;   // 픽셀 경계 또렷하게 (뭉개짐 방지)
  ctx.drawImage(qrImg,Math.round(x),Math.round(y),draw,draw);  // 좌표 정수화 → 외곽 픽셀 어긋남/스캔 저하 방지
  ctx.imageSmoothingEnabled=_sm;
}

/**
 * 1페이지(표지) 렌더링 — 배경 그라데이션, 썸네일, 오디오 컨트롤러,
 * 작품 정보(제목/서클/성우/등급/별점/하트/장르), 리뷰 텍스트, QR, 스포일러 배지, 작성자/날짜
 */
function drawPage1(ctx,W,H,layout,qrSize){
  const t=THEME_MAP[state.themeKey],v=getV(),isL=state.themeKey==="white",prog=state.progress;
  const unified=UNIFIED_THEMES.includes(state.themeKey);
  const topH=480,pg=layout.pages[0],total=layout.pages.length;
  drawBg(ctx,W,H,t,isL,unified,topH);
  
  // 썸네일 박스 드로잉 (1:1)
  const tw=350,th=350,tx=60,ty=60,pad=6;
  drawRR(ctx,tx,ty,tw,th,28);
  const fg=ctx.createLinearGradient(tx,ty,tx+tw,ty+th);
  fg.addColorStop(0,isL?"rgba(0,0,0,0.025)":"rgba(255,255,255,0.09)");
  fg.addColorStop(1,isL?"rgba(0,0,0,0.005)":"rgba(255,255,255,0.02)");

  const itx=tx+pad,ity=ty+pad,itw=tw-pad*2,ith=th-pad*2;
  ctx.save();drawRR(ctx,itx,ity,itw,ith,22);ctx.clip();
  if(state.thumbImg){
    const img=state.thumbImg,sc=Math.max(itw/img.width,ith/img.height),sw=img.width*sc,sh=img.height*sc;
    ctx.drawImage(img,itx+(itw-sw)/2,ity+(ith-sh)/2,sw,sh);
  } else {
    ctx.fillStyle=isL?"rgba(0,0,0,0.25)":"rgba(255,255,255,0.35)";ctx.font="500 16px 'Pretendard',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("📷",itx+itw/2,ity+ith/2-12);ctx.font="500 13px 'Pretendard',sans-serif";ctx.fillText(currentLang==="ja"?"画像をアップロード":"이미지를 올려주세요",itx+itw/2,ity+ith/2+14);ctx.textAlign="left";ctx.textBaseline="alphabetic";
  }
  ctx.restore();
  drawRR(ctx,itx,ity,itw,ith,22);ctx.strokeStyle=isL?"rgba(0,0,0,0.04)":"rgba(0,0,0,0.1)";ctx.lineWidth=1;ctx.stroke();
  drawRR(ctx,tx,ty,tw,th,28);ctx.strokeStyle=isL?"rgba(0,0,0,0.05)":"rgba(255,255,255,0.09)";ctx.lineWidth=1;ctx.stroke();
  
  // 우측 오디오 플레이어 영역 좌표 설정
  const rX=tx+tw+44,rW=W-rX-60,rCX=rX+rW/2;
  
  /* ========================================================
     [구역 1: 상단 정보 블록 - 글자수 제한 및 말줄임표 보정]
     ======================================================== */
  const tTop=ty+32;
  ctx.font="700 32px 'Pretendard',sans-serif";ctx.fillStyle=t.text;ctx.textAlign="left";
  
  // 1. 제목 그리기 (최대 2줄 제한)
  const tl=drawWrap(ctx,v.title,rX,tTop,rW,40,2);
  
  // 2. 써클명 / 성우명 결합
  const aT=tTop+(tl*40)+10;
  ctx.font="500 20px 'Pretendard',sans-serif";ctx.fillStyle=t.sub;
  let meta=[v.circle,v.artist].filter(s=>s&&s.trim()).join(" \u00b7 ");
  if(meta){
    if(ctx.measureText(meta).width>rW){
      while(meta.length>0&&ctx.measureText(meta+"...").width>rW){meta=meta.slice(0,-1);}
      meta+="...";
    }
    ctx.fillText(meta,rX,aT);
  }
  
  // 3. 평점 및 등급 배지 (시각적 별점/하트 표시)
  const iY=aT+38;
  const badge=state.ageRating;let sX=rX;
  if(badge!=="\uc120\ud0dd\uc548\ud568"){
    ctx.font="700 12px 'Pretendard',sans-serif";
    const bt=currentLang==="ja"?I18N.ja.ratings[I18N.ko.ratings.indexOf(badge)]:badge;
    const bW=ctx.measureText(bt).width+16;drawRR(ctx,rX,iY-14,bW,22,11);
    if(badge==="\uc804\uc5f0\ub839")ctx.fillStyle="#2ecc71";
    else if(badge==="R15")ctx.fillStyle="#e67e22";
    else if(badge==="R18")ctx.fillStyle="#e74c3c";
    ctx.fill();ctx.fillStyle="#fff";ctx.fillText(bt,rX+8,iY+2);sX=rX+bW+18;
  }
  if(state.starRating!=="\uc120\ud0dd\uc548\ud568"){
    const sc=parseInt(state.starRating.split("/")[0])||0;
    for(let i=0;i<5;i++){ctx.fillStyle=i<sc?"#ffb432":"rgba(255,180,50,0.25)";drawStarPath(ctx,sX+i*20+8,iY-3,9,4);}
    sX+=5*20+12;
  }
  if(state.eroRating!=="\uc120\ud0dd\uc548\ud568"){
    const hc=parseInt(state.eroRating.replace("\u2764 ",""));
    for(let i=0;i<5;i++){ctx.fillStyle=i<hc?"#ff6b6b":"rgba(255,107,107,0.2)";drawHeartPath(ctx,sX+i*18+7,iY-3,16);}

  drawRR(ctx,rX,bY,rW*prog,4,2);ctx.fillStyle=t.progressFill;ctx.fill();
  ctx.beginPath();ctx.arc(rX+rW*prog,bY+2,7,0,Math.PI*2);ctx.fillStyle=t.progressFill;ctx.fill();
  
  const dur=1200,cur=dur*prog,rem=dur-cur;
  ctx.font="500 13px 'Pretendard',monospace,sans-serif";ctx.fillStyle=t.sub;
  ctx.textAlign="left";ctx.fillText(formatTime(cur),rX,bY+24);
  ctx.textAlign="right";ctx.fillText("-"+formatTime(rem),rX+rW,bY+24);ctx.textAlign="left";
  
  const ctY=bY+70;ctx.fillStyle=t.ctrl;
  // ◀ 뒤로 — 일시정지와 같은 중심(ctY-10)에 정렬
  ctx.beginPath();ctx.moveTo(rCX-76,ctY-10);ctx.lineTo(rCX-56,ctY-20);ctx.lineTo(rCX-56,ctY);ctx.closePath();ctx.fill();

  // ▶ 앞으로
  ctx.beginPath();ctx.moveTo(rCX+76,ctY-10);ctx.lineTo(rCX+56,ctY-20);ctx.lineTo(rCX+56,ctY);ctx.closePath();ctx.fill();
  ctx.textAlign="left";
  
  // QR 코드 위치 고정 (42px). 고화질(2배) 저장 시 해상도가 올라가 사진앱에서도 또렷하게 읽힘
  // 기본 42px. 고화질 저장 모드(qrSize 전달)면 URL 길이에 따라 56~72px 자동 (긴 URL일수록 키워 스캔 보장)
  // QR 크기 48px 고정. 고화질 저장(해상도 2배) 기준 중간 길이 URL까지 사진앱 스캔되는 최소 크기 (작고 일정하게 유지)
  const _qs=48;
  drawQR(ctx,t,isL,rX+rW-_qs-2,topH-_qs-30,_qs);
  
  // 리뷰 패널
  const panelIsDark=unified?(!isL):true;
  if(!unified){ctx.fillStyle=isL?"#fafaf7":"#14141c";ctx.fillRect(0,topH,W,H-topH);}
  ctx.strokeStyle=isL?"rgba(0,0,0,0.08)":"rgba(255,255,255,0.09)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(80,topH);ctx.lineTo(W-80,topH);ctx.stroke();
  
  const rvX=80,rvW=W-160;
  ctx.font="700 60px Georgia,serif";ctx.fillStyle=t.accent;ctx.globalAlpha=unified?1:0.7;
  ctx.textBaseline="top";ctx.fillText("\u201c",rvX-6,topH+18);ctx.textBaseline="alphabetic";ctx.globalAlpha=1;
  
  let cY=topH+REVIEW_GAP;
  if(v.headline){
    ctx.font="700 26px 'Pretendard',sans-serif";ctx.fillStyle=t.accent;
    drawWrap(ctx,v.headline,rvX,cY,rvW,34,1);cY+=40;
  }
  ctx.font="400 "+state.fontSize+"px 'Pretendard',sans-serif";
  ctx.fillStyle=unified?resolveReviewColor(!isL,t,isL):resolveReviewColor(true,t,isL);
  const pLines=layout.lines.slice(pg.start,pg.start+pg.count);
  const acLineTop=cY-10,acLineBot=cY+pLines.length*reviewLH()-10;

  ctx.textBaseline="top";ctx.fillText("\u201c",rvX-6,CONT_TOP_PAD-56);ctx.textBaseline="alphabetic";ctx.globalAlpha=1;
  const acLineTop=CONT_TOP_PAD-10,acLineBot=CONT_TOP_PAD+pg.count*reviewLH()-10;
  ctx.save();ctx.globalAlpha=unified?0.25:0.45;ctx.strokeStyle=t.accent;ctx.lineWidth=2.5;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(rvX-16,acLineTop);ctx.lineTo(rvX-16,acLineBot);ctx.stroke();ctx.restore();
  let cY=CONT_TOP_PAD;
  ctx.font="400 "+state.fontSize+"px 'Pretendard',sans-serif";

  const textEndY=cY+pLines.length*reviewLH();

  drawPageIndicator(ctx,W,H,t,pageIdx+1,total);
}

function exportImage(scale){
  scale=scale||1;
  const layout=getReviewLayout(),total=layout.pages.length;
  const sfx=currentLang==="ja"?"review-ja":"review-ko",ts=Date.now();
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&/Macintosh/i.test(navigator.userAgent));
  async function saveBlob(blob,fname){
    if(isMobile&&navigator.canShare){const file=new File([blob],fname,{type:"image/png"});if(navigator.canShare({files:[file]})){try{await navigator.share({files:[file]});return true;}catch(e){if(e.name==="AbortError")return false;}}}

  }
  if(total===1){
    const c=document.createElement("canvas");c.width=CARD_W*scale;c.height=Math.round(layout.pages[0].h*scale);

    c.toBlob(blob=>saveBlob(blob,"voice-drama-"+sfx+"-"+ts+".png"),"image/png");
  } else {
    const canvases=layout.pages.map((pg,i)=>{
      const c=document.createElement("canvas");c.width=CARD_W*scale;c.height=Math.round(pg.h*scale);
      const cx=c.getContext("2d");cx.scale(scale,scale);
      if(i===0)drawPage1(cx,CARD_W,pg.h,layout);
      else drawContPage(cx,CARD_W,pg.h,layout,i);
      return c;
    });
    showToast(I18N[currentLang].multiSaveNotice);
    let idx=0;
    function saveNext(){
      if(idx>=canvases.length)return;
      const ci=idx;idx++;
      canvases[ci].toBlob(async blob=>{
        await saveBlob(blob,"voice-drama-"+sfx+"-"+ts+"-"+(ci+1)+".png");
        if(idx<canvases.length)setTimeout(saveNext,500);
      },"image/png");
    }
    saveNext();
  }
}

    ctx.save();ctx.translate(x,y);ctx.rotate(ang);
    ctx.beginPath();ctx.ellipse(0,0,len,size*0.012,0,0,Math.PI*2);
    ctx.fillStyle="rgba("+rgb.r+","+rgb.g+","+rgb.b+",1)";ctx.fill();
    ctx.restore();
  }
}
function drawCrayonScribble(ctx,size,hex,seed){
  // High-opacity crayon for actual coverage
  const rgb=_hexToRgb(hex);
  const rnd=_rand(seed);
  const pad=size*0.18;
  ctx.lineCap="round";
  // Dense hatching for crayon texture
  const passes=110;
  for(let i=0;i<passes;i++){
    const y=pad+(size-pad*2)*(i/passes)+(rnd()-0.5)*4;
    const x1=pad+rnd()*size*0.15,x2=size-pad-rnd()*size*0.15;
    ctx.beginPath();ctx.moveTo(x1+(rnd()-0.5)*8,y);
    const segs=10;
    for(let s=1;s<=segs;s++){
      const t=s/segs;
      const px=x1+(x2-x1)*t+(rnd()-0.5)*5;
      const py=y+(rnd()-0.5)*3;
      ctx.lineTo(px,py);
    }
    ctx.strokeStyle="rgba("+rgb.r+","+rgb.g+","+rgb.b+","+(0.88+rnd()*0.12)+")";
    ctx.lineWidth=2.8+rnd()*3.2;
    ctx.stroke();
  }
  for(let i=0;i<14;i++){
    const sx=pad+rnd()*(size-pad*2),sy=pad+rnd()*(size-pad*2);
    const dx=(rnd()-0.5)*size*0.25,dy=(rnd()-0.5)*size*0.18;
    ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(sx+dx,sy+dy);
    ctx.strokeStyle="rgba("+rgb.r+","+rgb.g+","+rgb.b+","+(0.78+rnd()*0.22)+")";
    ctx.lineWidth=1.8+rnd()*2;ctx.stroke();
  }
}
function drawRealBrush(ctx,size,hex,seed){
  // Realistic acrylic brush stroke with bristle striations, highlight & shadow
  const rgb=_hexToRgb(hex);
  ctx.save();ctx.translate(size/2,size/2);
  const rnd=_rand(seed);
  const angle=(rnd()-0.5)*0.4;ctx.rotate(angle);
  const w=size*0.84,h=size*0.32;
  // Clip to capsule shape
  ctx.save();
  const r=h/2;
  ctx.beginPath();
  ctx.moveTo(-w/2+r,-h/2);
  ctx.lineTo(w/2-r,-h/2);
  ctx.arc(w/2-r,0,r,-Math.PI/2,Math.PI/2);
  ctx.lineTo(-w/2+r,h/2);
  ctx.arc(-w/2+r,0,r,Math.PI/2,-Math.PI/2);
  ctx.closePath();ctx.clip();
  // Base solid color
  ctx.fillStyle="rgba("+rgb.r+","+rgb.g+","+rgb.b+",1)";
  ctx.fillRect(-w,-h,w*2,h*2);
  // Top highlight + bottom shadow (3D paint feel)
  const grad=ctx.createLinearGradient(0,-h/2,0,h/2);
  grad.addColorStop(0,"rgba(255,255,255,0.30)");
  grad.addColorStop(0.35,"rgba(255,255,255,0)");
  grad.addColorStop(0.65,"rgba(0,0,0,0)");
  grad.addColorStop(1,"rgba(0,0,0,0.22)");
  ctx.fillStyle=grad;ctx.fillRect(-w,-h,w*2,h*2);
  // Horizontal bristle striations (parallel to stroke)
  const numStreaks=60;
  for(let i=0;i<numStreaks;i++){
    const y=-h/2+(i/numStreaks)*h+(rnd()-0.5)*1.5;
    const isLight=rnd()>0.55;
    const alpha=0.06+rnd()*0.18;
    ctx.strokeStyle=isLight?"rgba(255,255,255,"+alpha+")":"rgba(0,0,0,"+(alpha*0.85)+")";
    ctx.lineWidth=0.4+rnd()*1.0;
    ctx.beginPath();
    const segments=12;
    ctx.moveTo(-w/2+rnd()*8,y);
    for(let s=1;s<=segments;s++){
      const x=-w/2+(s/segments)*w+(rnd()-0.5)*2;
      const yy=y+(rnd()-0.5)*1.2;
      ctx.lineTo(x,yy);
    }
    ctx.stroke();
  }
  ctx.restore();
  // Bristle tails extending past edges
  for(let i=0;i<12;i++){
    const y0=-h/2+rnd()*h;
    const dx=6+rnd()*22,dy=(rnd()-0.5)*4;
    ctx.beginPath();ctx.moveTo(w/2,y0);
    ctx.quadraticCurveTo(w/2+dx*0.6,y0+dy*0.3,w/2+dx,y0+dy);
    ctx.strokeStyle="rgba("+rgb.r+","+rgb.g+","+rgb.b+","+(0.45+rnd()*0.4)+")";
    ctx.lineWidth=0.6+rnd()*1.4;ctx.stroke();
  }
  for(let i=0;i<7;i++){
    const y0=-h/2+rnd()*h;
    const dx=-(4+rnd()*15),dy=(rnd()-0.5)*4;
    ctx.beginPath();ctx.moveTo(-w/2,y0);
    ctx.quadraticCurveTo(-w/2+dx*0.6,y0+dy*0.3,-w/2+dx,y0+dy);
    ctx.strokeStyle="rgba("+rgb.r+","+rgb.g+","+rgb.b+","+(0.4+rnd()*0.4)+")";
    ctx.lineWidth=0.5+rnd()*1.2;ctx.stroke();
  }
  ctx.restore();
}
// 낙서풍 하트 스티커 — 외곽선 + 내부 스크리블 채움 (붓 스티커와 동일하게 코드로 생성)
function drawDoodleHeart(ctx,size,hex,seed){
  const rgb=_hexToRgb(hex),rnd=_rand(seed);
  const cx=size/2, cy=size*0.54, s=size*0.32;
  function heartPath(k){
    const w=s*k,h=s*k;
    ctx.beginPath();
    ctx.moveTo(cx, cy+h*0.78);
    ctx.bezierCurveTo(cx, cy+h*0.40, cx-w*1.4, cy+h*0.10, cx-w*1.4, cy-h*0.35);
    ctx.bezierCurveTo(cx-w*1.4, cy-h*0.88, cx-w*0.45, cy-h*0.98, cx, cy-h*0.45);
    ctx.bezierCurveTo(cx+w*0.45, cy-h*0.98, cx+w*1.4, cy-h*0.88, cx+w*1.4, cy-h*0.35);
    ctx.bezierCurveTo(cx+w*1.4, cy+h*0.10, cx, cy+h*0.40, cx, cy+h*0.78);
    ctx.closePath();
  }
  // 부드러운 베이스 채움
  heartPath(1);ctx.fillStyle="rgba("+rgb.r+","+rgb.g+","+rgb.b+",0.68)";ctx.fill();
  // 내부 스크리블 (하트 모양으로 클리핑)
  ctx.save();heartPath(1);ctx.clip();
  ctx.lineCap="round";
  const lines=20;
  for(let i=0;i<lines;i++){
    const y=cy-s+(2*s)*(i/lines)+(rnd()-0.5)*5;
    ctx.strokeStyle="rgba("+rgb.r+","+rgb.g+","+rgb.b+","+(0.85+rnd()*0.15)+")";
    ctx.lineWidth=2+rnd()*3.5;
    ctx.beginPath();ctx.moveTo(cx-s*1.6,y);
    const segs=8;for(let k=1;k<=segs;k++){const t=k/segs;ctx.lineTo(cx-s*1.6+(3.2*s)*t,y+(rnd()-0.5)*6);}
    ctx.stroke();
  }
  ctx.restore();
  // 거친 외곽선
  ctx.lineJoin="round";ctx.lineWidth=size*0.028;
  ctx.strokeStyle="rgba("+rgb.r+","+rgb.g+","+rgb.b+",1)";
  heartPath(1);ctx.stroke();
  // 살짝 안쪽 하이라이트 선
  ctx.globalAlpha=0.5;ctx.lineWidth=size*0.012;ctx.strokeStyle="rgba(255,255,255,0.7)";
  heartPath(0.82);ctx.stroke();ctx.globalAlpha=1;
}
function drawBokashi(ctx,size,hex){
  // Multi-color soft gradient cloud (bokashi). Companion colors derived from base hex.
  const rgb=_hexToRgb(hex);
  const c1={r:rgb.r,g:rgb.g,b:rgb.b};
  const c2={r:Math.min(255,rgb.r+38),g:Math.max(0,rgb.g-18),b:Math.min(255,rgb.b+28)};
  const c3={r:Math.max(0,rgb.r-32),g:Math.min(255,rgb.g+28),b:Math.max(0,rgb.b-18)};
  const c4={r:Math.min(255,rgb.r+18),g:Math.min(255,rgb.g+32),b:rgb.b};
  const cx=size/2,cy=size/2;
  const orbs=[
    {x:cx-size*0.13,y:cy-size*0.12,r:size*0.36,col:c1,a:0.98},
    {x:cx+size*0.15,y:cy-size*0.10,r:size*0.33,col:c2,a:0.92},
    {x:cx-size*0.08,y:cy+size*0.15,r:size*0.35,col:c3,a:0.94},
    {x:cx+size*0.12,y:cy+size*0.13,r:size*0.30,col:c4,a:0.85},
    {x:cx,y:cy,r:size*0.34,col:c1,a:0.78}
  ];
  orbs.forEach(o=>{
    const grad=ctx.createRadialGradient(o.x,o.y,0,o.x,o.y,o.r);
    grad.addColorStop(0,"rgba("+o.col.r+","+o.col.g+","+o.col.b+","+o.a+")");
    grad.addColorStop(0.55,"rgba("+o.col.r+","+o.col.g+","+o.col.b+","+(o.a*0.75)+")");
    grad.addColorStop(1,"rgba("+o.col.r+","+o.col.g+","+o.col.b+",0)");
    ctx.fillStyle=grad;ctx.fillRect(0,0,size,size);
  });
}
let _stkPreviewCache={};
function stickerThumbHTML(kind,color){
  const key=kind+"|"+(color||"auto");
  if(!_stkPreviewCache[key]){
    const c=makeStickerCanvas(kind,color,72);
    _stkPreviewCache[key]=c.toDataURL();

}
function addPresetSticker(kind,color){
  const src=ieGetCurrent();if(!src)return;
  const c=makeStickerCanvas(kind,color,512);
  const img=new Image();
  img.onload=()=>{
    const md=Math.min(src.width,src.height)*0.45,asp=img.width/img.height;
    ie.stickers.push({img,x:src.width/2-md/2,y:src.height/2-md/asp/2,w:md,h:md/asp,r:0});
    ieRender();
  };
  img.src=c.toDataURL();
}

/* ===== ROTATE / FLIP ===== */
function ieRotate(deg){
  const src=ieGetCurrent();if(!src)return;
  const rad=deg*Math.PI/180,s=Math.abs(Math.sin(rad)),co=Math.abs(Math.cos(rad));
  const nw=Math.round(src.width*co+src.height*s),nh=Math.round(src.width*s+src.height*co);
  const c=document.createElement("canvas");c.width=nw;c.height=nh;
  const ctx=c.getContext("2d");ctx.translate(nw/2,nh/2);ctx.rotate(rad);ctx.drawImage(src,-src.width/2,-src.height/2);
  iePushHistory(c);
  ie.filterBase=null;ie.crop={active:false,sx:0,sy:0,ex:0,ey:0};ieTool(ie.tool);
}
function ieFlip(axis){
  const src=ieGetCurrent();if(!src)return;
  const c=document.createElement("canvas");c.width=src.width;c.height=src.height;
  const ctx=c.getContext("2d");
  if(axis==="h"){ctx.translate(src.width,0);ctx.scale(-1,1);}
  else{ctx.translate(0,src.height);ctx.scale(1,-1);}
  ctx.drawImage(src,0,0);iePushHistory(c);
  ie.filterBase=null;ie.crop={active:false,sx:0,sy:0,ex:0,ey:0};ieTool(ie.tool);
}

function ensureFilterBase(){
  if(ie.filterBase)return;
  _filtCache.sig=null;  // 베이스가 새로 만들어지면 필터 캐시 무효화 (같은 필터값이라도 재연산)
  const cur=ieGetCurrent();const maxPrev=_isMobile?500:900;
  const sc=Math.min(1,maxPrev/Math.max(cur.width,cur.height));
  ie.filterBase=document.createElement("canvas");
  ie.filterBase.width=Math.max(1,Math.round(cur.width*sc));
  ie.filterBase.height=Math.max(1,Math.round(cur.height*sc));
  ie.filterBase.getContext("2d").drawImage(cur,0,0,ie.filterBase.width,ie.filterBase.height);
}

      +'<div class="ie-slider-row"><label>'+d.intensity+'</label><input type="range" min="5" max="100" step="1" value="'+ie.intensity+'" data-ie="intensity"><span id="ieIntVal">'+ie.intensity+'%</span></div>'
      +'</div>'
      +'<div class="ie-slider-divider"></div>'
      +'<div class="ie-slider-group">'
      +(bm==="blur"
        ? '<div class="ie-slider-row"><label>'+d.fBlur+'</label><input type="range" min="0" max="100" step="1" value="'+ie.filter.blur+'" data-ie="fBlur"><span id="ieFullVal">'+ie.filter.blur+'%</span></div>'
        : '<div class="ie-slider-row"><label>'+d.fMosaic+'</label><input type="range" min="0" max="100" step="1" value="'+ie.filter.mosaic+'" data-ie="fMosaic"><span id="ieFullVal">'+ie.filter.mosaic+'%</span></div>')

      +'<div class="ie-slider-row"><label>'+d.fBright+'</label><input type="range" min="0" max="100" step="1" value="'+ie.filter.brightness+'" data-ie="fBright"><span>'+ie.filter.brightness+'%</span></div>'

      +'<div class="ie-slider-row"><label>'+d.fGrain+'</label><input type="range" min="0" max="100" step="1" value="'+ie.filter.grain+'" data-ie="fGrain"><span>'+ie.filter.grain+'%</span></div>'

  } else if(name==="draw"){

function ieSetBrushMode(m){
  ie.brushMode=m;
  document.querySelectorAll('#ieOpts [data-bm]').forEach(b=>b.classList.toggle('active',b.dataset.bm===m));
  ieTool("brush"); // 패널 재구성(전체 효과 슬라이더가 모드에 맞게 바뀜)
}
function setCropRatio(r){
  ie.cropRatio=r;ie.cropAction=null;
  document.querySelectorAll('#ieOpts [data-ratio]').forEach(b=>{
    const br=b.dataset.ratio;
    b.classList.toggle('active',(r===null&&br==='free')||(r!==null&&Math.abs(parseFloat(br)-r)<0.01));
  });
  if(r===null){
    // 자유 비율: 박스 해제하고 사용자가 직접 드래그
    ie.crop={active:false,sx:0,sy:0,ex:0,ey:0};
    ieRender();
  } else {
    // 먼저 렌더해서 ie.scale 을 현재 히스토리 캔버스 기준으로 갱신 (굽기 후 크기 변동 대응)
    ie.crop={active:false,sx:0,sy:0,ex:0,ey:0};
    ieRender();
    // 고정 비율: 이미지(표시 크기) 중앙에 최대 크기 박스 자동 생성 → 확정만 누르면 됨
    const cur=ieGetCurrent();if(cur){
      const sc=ie.scale,dw=cur.width*sc,dh=cur.height*sc; // 갱신된 표시(캔버스) px 기준
      const m=0.9; // 여백 90%
      let bw=dw*m,bh=bw/r;
      if(bh>dh*m){bh=dh*m;bw=bh*r;}
      const x=(dw-bw)/2,y=(dh-bh)/2;
      ie.crop={active:true,sx:x,sy:y,ex:x+bw,ey:y+bh};
    }
    ieRender();

// [수정 #4] 필터용 버퍼 캔버스 재사용 (매 프레임 생성 방지, _fBuf1=작업용, _fBuf2=모자이크 축소용)
const _fBuf1=document.createElement("canvas"),_fBuf2=document.createElement("canvas");

/**
 * 필터 파이프라인: 모자이크(축소→확대) → 블러(StackBlur) → 색상 필터(흑백/밝기/대비/세피아/채도)
 * Safari 호환을 위해 ctx.filter 대신 픽셀 기반 처리 사용
 */
// 필름 그레인(흑백 노이즈) — 색상 필터 이후 마지막 단계로 적용
function applyGrain(canvas,amount){
  const ctx=canvas.getContext("2d"),w=canvas.width,h=canvas.height;
  const id=ctx.getImageData(0,0,w,h),d=id.data,amp=amount/100*70;
  for(let i=0;i<d.length;i+=4){
    const n=(Math.random()-0.5)*amp;
    d[i]=Math.max(0,Math.min(255,d[i]+n));
    d[i+1]=Math.max(0,Math.min(255,d[i+1]+n));
    d[i+2]=Math.max(0,Math.min(255,d[i+2]+n));
  }
  ctx.putImageData(id,0,0);
}
// 화면에 보이던 색상/그레인/전체블러·모자이크 필터를 작업 원본에 확정(flatten)하고 필터값을 0으로.
// 낙서(펜) 진입 시 호출 → 이후 펜은 "필터가 구워진 사진" 위에 원래 색으로 칠해진다.
// 현재 스티커들을 작업 원본 캔버스에 합성(flatten)하고 목록을 비운다.
// 낙서(펜) 진입 시 호출 → 그때까지의 스티커가 사진 일부가 되어, 이후 펜이 그 위에 그려진다.
function ieBakeStickers(){
  if(!ie.stickers||ie.stickers.length===0)return;
  const cur=ieGetCurrent();if(!cur)return;
  const out=document.createElement("canvas");out.width=cur.width;out.height=cur.height;
  const oc=out.getContext("2d");oc.drawImage(cur,0,0);
  ie.stickers.forEach(st=>{
    const cx=st.x+st.w/2,cy=st.y+st.h/2;
    oc.save();oc.translate(cx,cy);oc.rotate(st.r||0);
    oc.drawImage(st.img,-st.w/2,-st.h/2,st.w,st.h);
    oc.restore();
  });

  ie.stickers=[];
  ie.filterBase=null;_filtCache.sig=null;  // 스티커 합성으로 cur 내용이 바뀌었으므로 표시 레이어 무효화
}
function ieBakeFilter(){
  const f=ie.filter;
  const hasF=f.blur>0||f.mosaic>0||f.gray>0||f.brightness>0||f.contrast>0||f.sepia>0||f.saturate>0||f.grain>0;
  // 스티커가 떠 있으면 먼저 사진에 합성 → 화면에 보이는 "스티커 포함 사진"이 필터/브러시의 바탕이 됨 (1번: 보이는 대로 확정)
  if(!hasF&&(!ie.stickers||ie.stickers.length===0))return;
  ieBakeStickers();                             // 스티커를 사진에 먼저 굽는다 (있으면)
  if(!hasF){ie.filterBase=null;return;}         // 필터가 없으면 스티커 합성까지만 하고 종료
  const cur=ieGetCurrent();if(!cur)return;       // 이제 cur 은 스티커가 포함된 사진
  const baked=applyFilters(cur,f);              // 스티커 포함 사진 전체에 필터 적용
  const flat=document.createElement("canvas");
  flat.width=baked.width;flat.height=baked.height;
  flat.getContext("2d").putImageData(baked.getContext("2d").getImageData(0,0,baked.width,baked.height),0,0);
  iePushHistory(flat);                          // 구운 결과를 새 히스토리 단계로
  ie.filter={blur:0,mosaic:0,gray:0,brightness:0,contrast:0,sepia:0,saturate:0,grain:0};
  ie.filterBase=null;

let _filtCache={sig:null};
function applyFilters(srcCanvas,f){
  const w=srcCanvas.width,h=srcCanvas.height;
  // 캐시: 같은 베이스(크기)·같은 필터값이면 재연산 생략. grain 은 매번 랜덤이라 캐시 제외.
  const sig=f.grain>0?null:(w+"x"+h+"|"+f.blur+","+f.mosaic+","+f.gray+","+f.brightness+","+f.contrast+","+f.sepia+","+f.saturate);
  if(sig&&_filtCache.sig===sig&&_fBuf1.width===w&&_fBuf1.height===h)return _fBuf1;
  _filtCache.sig=sig;
  _fBuf1.width=w;_fBuf1.height=h;let ctx=_fBuf1.getContext("2d");
  if(f.mosaic>0){
    const bs=Math.max(2,Math.round(f.mosaic/100*40));
    const smW=Math.max(1,Math.round(w/bs)),smH=Math.max(1,Math.round(h/bs));
    _fBuf2.width=smW;_fBuf2.height=smH;
    const tc=_fBuf2.getContext("2d");tc.imageSmoothingEnabled=true;tc.drawImage(srcCanvas,0,0,smW,smH);
    ctx.imageSmoothingEnabled=false;ctx.drawImage(_fBuf2,0,0,w,h);
    ctx.imageSmoothingEnabled=true;
  } else { ctx.drawImage(srcCanvas,0,0); }
  if(f.blur>0){
    const rad=Math.max(1,Math.round(f.blur/100*40));
    stackBlur(_fBuf1,rad);
  }
  applyColorFilters(_fBuf1,f);
  if(f.grain>0)applyGrain(_fBuf1,f.grain);
  return _fBuf1;
}

// 마우스/터치 좌표 → 캔버스 픽셀 좌표 변환 (CSS 크기 ≠ 캔버스 해상도 보정)
function iePos(e){
  const r=ieCanvas.getBoundingClientRect();
  const t=e.touches&&e.touches.length?e.touches[0]:(e.changedTouches&&e.changedTouches.length?e.changedTouches[0]:e);
  const sx=r.width>0?(ie._dispW||ieCanvas.width)/r.width:1;
  const sy=r.height>0?(ie._dispH||ieCanvas.height)/r.height:1;
  return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};
}
function ieRealPos(e){const p=iePos(e);return{x:p.x/ie.scale,y:p.y/ie.scale};}
ieCanvas.addEventListener("mousedown",ieDown);ieCanvas.addEventListener("touchstart",e=>{e.preventDefault();ieDown(e);},{passive:false});
ieCanvas.addEventListener("mousemove",ieMove);ieCanvas.addEventListener("touchmove",e=>{e.preventDefault();ieMove(e);},{passive:false});
window.addEventListener("mouseup",ieUp);window.addEventListener("touchend",ieUp);
// 슬라이더 터치 이벤트가 캔버스 핸들러에 전파되지 않도록 차단
document.querySelector(".ie-modal").addEventListener("touchstart",e=>{if(e.target.tagName==="INPUT")e.stopPropagation();},{passive:true});
document.querySelector(".ie-modal").addEventListener("touchmove",e=>{if(e.target.tagName==="INPUT")e.stopPropagation();},{passive:true});

// 이벤트 위임: 모든 에디터 슬라이더를 data-ie 속성으로 통합 처리
(function(){
  const map={brushSize:v=>{ie.brushSize=v},intensity:v=>{ie.intensity=v;const s=document.getElementById("ieIntVal");if(s)s.textContent=v+"%"},
    fBlur:v=>{ie.filter.blur=v;scheduleIERender()},
    fMosaic:v=>{ie.filter.mosaic=v;scheduleIERender()},
    fGray:v=>{ie.filter.gray=v;scheduleIERender()},fBright:v=>{ie.filter.brightness=v;scheduleIERender()},
    fContrast:v=>{ie.filter.contrast=v;scheduleIERender()},fGrain:v=>{ie.filter.grain=v;scheduleIERender()},drawSize:v=>{ie.drawSize=v;const s=document.getElementById("ieDrawVal");if(s)s.textContent=v+"px"}};
  function handle(e){
    const t=e.target;if(!t||t.tagName!=="INPUT"||!t.dataset.ie)return;
    const fn=map[t.dataset.ie];if(fn)fn(+t.value);
    const sp=t.nextElementSibling;if(sp&&sp.tagName==="SPAN"&&t.dataset.ie.startsWith("f"))sp.textContent=t.value+"%";
  }
  document.querySelector(".ie-modal").addEventListener("input",handle);
  document.querySelector(".ie-modal").addEventListener("change",handle);
})();

// 캔버스 포인터 다운 이벤트 — 도구별 분기: 크롭(영역생성/핸들), 블러·모자이크(페인팅 시작), 스티커(선택/드래그/리사이즈/회전/삭제)
function ieDown(e){
  const p=iePos(e),rp=ieRealPos(e);
  if(ie.tool==="crop"){
    if(ie.crop.active){
      const hit=cropHitTest(p);
      if(hit==='confirm'){doCrop();return;}
      if(hit==='cancel'){cancelCrop();return;}
      if(hit==='move'||hit==='nw'||hit==='ne'||hit==='sw'||hit==='se'||hit==='n'||hit==='s'||hit==='e'||hit==='w'){
        const c=ie.crop,cx=Math.min(c.sx,c.ex),cy=Math.min(c.sy,c.ey),cw=Math.abs(c.ex-c.sx),ch=Math.abs(c.ey-c.sy);
        ie.cropAction=hit;ie.cropDragStart={x:p.x,y:p.y};ie.cropOrigRect={x:cx,y:cy,w:cw,h:ch};
        ie.crop.sx=cx;ie.crop.sy=cy;ie.crop.ex=cx+cw;ie.crop.ey=cy+ch;
        return;
      }
    }
    ie.cropAction='draw';ie.cropDragStart={x:p.x,y:p.y};
    ie.crop={active:true,sx:p.x,sy:p.y,ex:p.x,ey:p.y};
  } else if(ie.tool==="brush"){
    ieBakeFilter(); // 스티커+필터를 사진에 먼저 굽고 시작 → 개별 브러시가 스티커 위에, 필터에 안 가려지게
    ie._paintSnapshot=document.createElement("canvas");ie._paintSnapshot.width=ieGetCurrent().width;ie._paintSnapshot.height=ieGetCurrent().height;
    ie._paintSnapshot.getContext("2d").drawImage(ieGetCurrent(),0,0);
    const work=document.createElement("canvas");work.width=ie._paintSnapshot.width;work.height=ie._paintSnapshot.height;
    work.getContext("2d").drawImage(ie._paintSnapshot,0,0);
    iePushHistory(work);
    ie.painting=true;
    iePaintAt(rp.x,rp.y);
  } else if(ie.tool==="draw"){
    iePushHistory(ieGetCurrent());
    ie.painting=true;ie._lastDraw=null;
    ieDrawAt(rp.x,rp.y);
  } else if(ie.tool==="sticker"){
    for(let i=ie.stickers.length-1;i>=0;i--){
      const st=ie.stickers[i];
      const sc=ie.scale,hw=st.w*sc/2,hh=st.h*sc/2;
      const lp=stkLocalPoint(st,p.x,p.y);
      // delete (top-right, offset outside)
      if(Math.hypot(lp.x-(hw+14),lp.y-(-hh-14))<14){ie.stickers.splice(i,1);ieRender();return;}
      // rotation handle (above top-center)
      if(Math.hypot(lp.x,lp.y-(-hh-22))<14){
        ie.stickerRotate={idx:i,startAng:Math.atan2(p.y-lp.cy,p.x-lp.cx),origR:st.r||0};
        return;
      }
      // 4 corner handles — free transform
      const corners=[
        {lx:-hw,ly:-hh,sx:-1,sy:-1},
        {lx:hw,ly:-hh,sx:1,sy:-1},
        {lx:-hw,ly:hh,sx:-1,sy:1},
        {lx:hw,ly:hh,sx:1,sy:1}
      ];
      let hitCorner=false;
      for(const c of corners){
        if(lp.x>=c.lx-9&&lp.x<=c.lx+9&&lp.y>=c.ly-9&&lp.y<=c.ly+9){
          const r=st.r||0;
          const imgCx=st.x+st.w/2, imgCy=st.y+st.h/2;
          const oLocalX=-c.sx*st.w/2, oLocalY=-c.sy*st.h/2;
          const anchorX=imgCx+oLocalX*Math.cos(r)-oLocalY*Math.sin(r);
          const anchorY=imgCy+oLocalX*Math.sin(r)+oLocalY*Math.cos(r);
          ie.stickerFreeResize={idx:i,signX:c.sx,signY:c.sy,anchorX,anchorY,rot:r};
          hitCorner=true;break;
        }
      }
      if(hitCorner)return;
      // body (within local bounds)
      if(lp.x>=-hw&&lp.x<=hw&&lp.y>=-hh&&lp.y<=hh){
        ie.stickerDrag={idx:i,offX:p.x-lp.cx,offY:p.y-lp.cy};
        return;
      }
    }
  }
}
// 캔버스 포인터 이동 이벤트 — 크롭 드래그/리사이즈, 블러·모자이크 브러시 페인팅, 스티커 드래그/리사이즈/회전 처리
function ieMove(e){
  const p=iePos(e),rp=ieRealPos(e);
  if(ie.tool==="crop"&&ie.cropAction&&(e.buttons===1||e.touches)){
    const dx=p.x-ie.cropDragStart.x,dy=p.y-ie.cropDragStart.y;
    if(ie.cropAction==='draw'){
      ie.crop.ex=p.x;ie.crop.ey=p.y;
      enforceCropRatio();
    } else if(ie.cropAction==='move'){
      const r=ie.cropOrigRect;
      let nx=r.x+dx,ny=r.y+dy;
      nx=Math.max(0,Math.min(nx,(ie._dispW||ieCanvas.width)-r.w));
      ny=Math.max(0,Math.min(ny,(ie._dispH||ieCanvas.height)-r.h));
      ie.crop.sx=nx;ie.crop.sy=ny;ie.crop.ex=nx+r.w;ie.crop.ey=ny+r.h;
    } else {
      const r=ie.cropOrigRect;let nx=r.x,ny=r.y,nw=r.w,nh=r.h;
      if(ie.cropAction==='se'){nw=Math.max(20,r.w+dx);nh=Math.max(20,r.h+dy);}
      else if(ie.cropAction==='sw'){nx=r.x+dx;nw=Math.max(20,r.w-dx);nh=Math.max(20,r.h+dy);}
      else if(ie.cropAction==='ne'){nw=Math.max(20,r.w+dx);ny=r.y+dy;nh=Math.max(20,r.h-dy);}
      else if(ie.cropAction==='nw'){nx=r.x+dx;ny=r.y+dy;nw=Math.max(20,r.w-dx);nh=Math.max(20,r.h-dy);}
      else if(ie.cropAction==='e'){nw=Math.max(20,r.w+dx);}
      else if(ie.cropAction==='w'){nx=r.x+dx;nw=Math.max(20,r.w-dx);}
      else if(ie.cropAction==='s'){nh=Math.max(20,r.h+dy);}
      else if(ie.cropAction==='n'){ny=r.y+dy;nh=Math.max(20,r.h-dy);}
      if(ie.cropRatio&&nw>20&&nh>20){const rat=ie.cropRatio;
        if(nw/rat>nh){nh=nw/rat;}else{nw=nh*rat;}
        if(ie.cropAction==='nw'){nx=r.x+r.w-nw;ny=r.y+r.h-nh;}
        else if(ie.cropAction==='ne'){ny=r.y+r.h-nh;}
        else if(ie.cropAction==='sw'){nx=r.x+r.w-nw;}}
      ie.crop.sx=nx;ie.crop.sy=ny;ie.crop.ex=nx+nw;ie.crop.ey=ny+nh;
    }
    scheduleIERender();}
  else if(ie.tool==="crop"&&!ie.cropAction&&ie.crop.active){
    const hit=cropHitTest(p);
    const cur={nw:'nwse-resize',se:'nwse-resize',ne:'nesw-resize',sw:'nesw-resize',n:'ns-resize',s:'ns-resize',e:'ew-resize',w:'ew-resize',move:'move',confirm:'pointer',cancel:'pointer'};
    ieCanvas.style.cursor=cur[hit]||'crosshair';}
  else if(ie.tool==="crop"&&!ie.crop.active){ieCanvas.style.cursor='crosshair';}
  else if(ie.tool==="brush"&&ie.painting){iePaintAt(rp.x,rp.y);}
  else if(ie.tool==="draw"&&ie.painting){ieDrawAt(rp.x,rp.y);}
  else if(ie.tool==="sticker"&&ie.stickerDrag){
    const st=ie.stickers[ie.stickerDrag.idx],sc=ie.scale;
    const ncx=(p.x-ie.stickerDrag.offX)/sc,ncy=(p.y-ie.stickerDrag.offY)/sc;
    st.x=ncx-st.w/2;st.y=ncy-st.h/2;
    scheduleIERender();
  }
  else if(ie.tool==="sticker"&&ie.stickerFreeResize){
    const fr=ie.stickerFreeResize,st=ie.stickers[fr.idx],sc=ie.scale;
    const r=fr.rot;
    const mx=p.x/sc, my=p.y/sc;
    const dx=mx-fr.anchorX, dy=my-fr.anchorY;
    const localW=dx*Math.cos(r)+dy*Math.sin(r);
    const localH=-dx*Math.sin(r)+dy*Math.cos(r);
    const newW=Math.max(20,localW*fr.signX);
    const newH=Math.max(20,localH*fr.signY);
    const offX=fr.signX*newW/2, offY=fr.signY*newH/2;
    const ncx=fr.anchorX+offX*Math.cos(r)-offY*Math.sin(r);
    const ncy=fr.anchorY+offX*Math.sin(r)+offY*Math.cos(r);
    st.w=newW;st.h=newH;st.x=ncx-newW/2;st.y=ncy-newH/2;
    scheduleIERender();
  }
  else if(ie.tool==="sticker"&&ie.stickerResize){
    const r=ie.stickerResize,st=ie.stickers[r.idx],sc=ie.scale;
    const cx=(st.x+st.w/2)*sc,cy=(st.y+st.h/2)*sc;
    const newDist=Math.hypot(p.x-cx,p.y-cy);
    const ratio=Math.max(0.2,newDist/r.startDist);
    const nw=Math.max(30,r.origW*ratio),nh=Math.max(30,r.origH*ratio);

    st.w=nw;st.h=nh;
    scheduleIERender();
  }
  else if(ie.tool==="sticker"&&ie.stickerRotate){
    const r=ie.stickerRotate,st=ie.stickers[r.idx],sc=ie.scale;
    const cx=(st.x+st.w/2)*sc,cy=(st.y+st.h/2)*sc;
    const curAng=Math.atan2(p.y-cy,p.x-cx);
    st.r=r.origR+(curAng-r.startAng);
    scheduleIERender();
  }
}
// 캔버스 포인터 업 이벤트 — 모든 드래그 상태 해제, 블러·모자이크 페인팅 종료 후 필터 베이스 갱신
function ieUp(){
  ie.cropAction=null;
  if(ie.tool==="brush"&&ie.painting){ie.painting=false;ie.filterBase=null;}
  if(ie.tool==="draw")ie.painting=false;
  ie.stickerDrag=null;ie.stickerResize=null;ie.stickerRotate=null;ie.stickerFreeResize=null;
}

// [수정 #5] 브러시 페인팅용 버퍼 캔버스 재사용 (_pBuf1=블러패치, _pBuf2=임시, _pMosaic=모자이크패치)
const _pBuf1=document.createElement("canvas"),_pBuf2=document.createElement("canvas"),_pMosaic=document.createElement("canvas");

// 브러시 단일 스탬프 — 원본 스냅샷(ie._paintSnapshot) 기준으로 블러/모자이크를 원형 클리핑하여 적용
// 손낙서 펜 — 현재 히스토리 캔버스에 색 선을 직접 그림 (이미지 px 좌표)
function ieDrawAt(x,y){
  const src=ieGetCurrent();if(!src)return;const ctx=src.getContext("2d");
  ctx.strokeStyle=ie.drawColor;ctx.fillStyle=ie.drawColor;ctx.lineCap="round";ctx.lineJoin="round";ctx.lineWidth=ie.drawSize;
  const l=ie._lastDraw;
  if(l){ctx.beginPath();ctx.moveTo(l.x,l.y);ctx.lineTo(x,y);ctx.stroke();}
  else {ctx.beginPath();ctx.arc(x,y,ie.drawSize/2,0,Math.PI*2);ctx.fill();}
  ie._lastDraw={x,y};ie.filterBase=null;_filtCache.sig=null;scheduleIERender();
}
function iePaintAt(rx,ry){
  const src=ieGetCurrent();if(!src)return;const ctx=src.getContext("2d"),snap=ie._paintSnapshot;if(!snap)return;
  const r=ie.brushSize,strength=ie.intensity/100;
  const sx=Math.max(0,Math.floor(rx-r)),sy=Math.max(0,Math.floor(ry-r)),sw=Math.min(src.width-sx,r*2),sh=Math.min(src.height-sy,r*2);
  if(sw<=0||sh<=0)return;
  if(ie.brushMode==="blur"){
    const px=Math.max(2,Math.round(strength*30)),pad=px*2;
    const ex=Math.max(0,sx-pad),ey=Math.max(0,sy-pad),ew=Math.min(src.width-ex,sw+pad*2),eh=Math.min(src.height-ey,sh+pad*2);
    if(ew<=0||eh<=0)return;
    _pBuf1.width=ew;_pBuf1.height=eh;
    _pBuf1.getContext("2d").drawImage(snap,ex,ey,ew,eh,0,0,ew,eh);
    stackBlur(_pBuf1,px);
    ctx.save();ctx.beginPath();ctx.arc(rx,ry,r,0,Math.PI*2);ctx.clip();
    ctx.drawImage(_pBuf1,ex,ey);ctx.restore();
  } else if(ie.brushMode==="mosaic"){
    const bs=Math.max(2,Math.round(2+strength*20)),imgD=snap.getContext("2d").getImageData(sx,sy,sw,sh),out=ctx.createImageData(sw,sh);
    for(let by=0;by<sh;by+=bs){for(let bx=0;bx<sw;bx+=bs){let rr=0,gg=0,bb=0,aa=0,cnt=0;
      for(let yy=by;yy<Math.min(by+bs,sh);yy++){for(let xx=bx;xx<Math.min(bx+bs,sw);xx++){const idx=(yy*sw+xx)*4;rr+=imgD.data[idx];gg+=imgD.data[idx+1];bb+=imgD.data[idx+2];aa+=imgD.data[idx+3];cnt++;}}
      rr=Math.round(rr/cnt);gg=Math.round(gg/cnt);bb=Math.round(bb/cnt);aa=Math.round(aa/cnt);
      for(let yy=by;yy<Math.min(by+bs,sh);yy++){for(let xx=bx;xx<Math.min(bx+bs,sw);xx++){const idx=(yy*sw+xx)*4;out.data[idx]=rr;out.data[idx+1]=gg;out.data[idx+2]=bb;out.data[idx+3]=aa;}}}}
    _pMosaic.width=sw;_pMosaic.height=sh;_pMosaic.getContext("2d").putImageData(out,0,0);
    ctx.save();ctx.beginPath();ctx.arc(rx,ry,r,0,Math.PI*2);ctx.clip();ctx.drawImage(_pMosaic,sx,sy);ctx.restore();
  }
  // 방금 칠한 원본을 반영하도록 표시 레이어 무효화 (다음 렌더에서 재생성)
  ie.filterBase=null;_filtCache.sig=null;
  scheduleIERender();
}
// 크롭 확정 — 선택 영역을 실제 이미지 좌표로 변환(scale 역산)하여 잘라낸 뒤 히스토리에 저장
function doCrop(){
  const c=ie.crop,sc=ie.scale,x=Math.round(Math.min(c.sx,c.ex)/sc),y=Math.round(Math.min(c.sy,c.ey)/sc),w=Math.round(Math.abs(c.ex-c.sx)/sc),h=Math.round(Math.abs(c.ey-c.sy)/sc);
  if(w<10||h<10)return;const src=ieGetCurrent(),cx=Math.max(0,Math.min(x,src.width)),cy=Math.max(0,Math.min(y,src.height)),cw=Math.min(w,src.width-cx),ch=Math.min(h,src.height-cy);
  const nc=document.createElement("canvas");nc.width=cw;nc.height=ch;nc.getContext("2d").drawImage(src,cx,cy,cw,ch,0,0,cw,ch);
  iePushHistory(nc);ie.crop={active:false,sx:0,sy:0,ex:0,ey:0};ie.filterBase=null;_filtCache.sig=null;ieRender();
}
document.getElementById("stickerFileInput").addEventListener("change",e=>{
  const files=e.target.files;if(!files.length)return;
  Array.from(files).forEach(f=>{const u=URL.createObjectURL(f);const img=new Image();img.onload=()=>{
    URL.revokeObjectURL(u); // [수정 #6] 스티커 Blob URL 해제
    const src=ieGetCurrent();const md=Math.min(src.width,src.height)*0.3,asp=img.width/img.height;
    ie.stickers.push({img,x:src.width/2-md/2,y:src.height/2-md/asp/2,w:md,h:md/asp,r:0});ieRender();};img.src=u;});e.target.value="";
});

// [수정] 편집 완료 후 적용 함수 (기존 파일 메모리 완전 정리 최적화)
// 편집본(필터+스티커 합성)을 평탄화한 캔버스 반환 — 히스토리/필터 상태를 건드리지 않음(비파괴)
function ieFlatten(){
  let src=ieGetCurrent();
  const _f=ie.filter,_any=_f.blur>0||_f.mosaic>0||_f.gray>0||_f.brightness>0||_f.contrast>0||_f.sepia>0||_f.saturate>0||_f.grain>0;
  if(_any)src=applyFilters(src,ie.filter);
  const out=document.createElement("canvas");out.width=src.width;out.height=src.height;
  const oc=out.getContext("2d");oc.drawImage(src,0,0);
  ie.stickers.forEach(st=>{
    const cx=st.x+st.w/2,cy=st.y+st.h/2;
    oc.save();oc.translate(cx,cy);oc.rotate(st.r||0);
    oc.drawImage(st.img,-st.w/2,-st.h/2,st.w,st.h);
    oc.restore();
  });
  return out;
}
// 편집한 이미지만 따로 PNG로 저장 (카드에 적용하지 않음). 모바일은 공유 시트, 데스크톱은 다운로드.
function ieDownload(){
  ieFlatten().toBlob(blob=>{
    if(!blob)return;
    const fname="edited-image-"+Date.now()+".png";
    const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&/Macintosh/i.test(navigator.userAgent));
    if(isMobile&&navigator.canShare){
      const file=new File([blob],fname,{type:"image/png"});
      if(navigator.canShare({files:[file]})){navigator.share({files:[file]}).catch(()=>{});return;}
    }
    const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download=fname;
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(a.href),1000);
  },"image/png");
}
function ieApply() {
  const _af = ie.filter, _anyF = _af.blur > 0 || _af.mosaic > 0 || _af.gray > 0 || _af.brightness > 0 || _af.contrast > 0 || _af.sepia > 0 || _af.saturate > 0 || _af.grain > 0;
  if (_anyF) {
    const full = ieGetCurrent();
    const filtered = applyFilters(full, ie.filter);
    iePushHistory(filtered);
    ie.filter = { blur: 0, mosaic: 0, gray: 0, brightness: 0, contrast: 0, sepia: 0, saturate: 0 };
    ie.filterBase = null;
  }
  let src = ieGetCurrent();
  const final = document.createElement("canvas");
  final.width = src.width; final.height = src.height;
  const fc = final.getContext("2d"); fc.drawImage(src, 0, 0);
  ie.stickers.forEach(st => {
    const cx=st.x+st.w/2,cy=st.y+st.h/2;
    fc.save();fc.translate(cx,cy);fc.rotate(st.r||0);
    fc.drawImage(st.img,-st.w/2,-st.h/2,st.w,st.h);
    fc.restore();
  });
  
  // [수정 #7] toDataURL → toBlob + createObjectURL (메모리 효율 개선)
  final.toBlob(blob => {
    if (!blob) return;
    const du = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      if (state.thumbUrl && state.thumbUrl.startsWith('blob:')) {
        URL.revokeObjectURL(state.thumbUrl);
      }
      state.thumbImg = img;
      state.thumbUrl = du;
      // originalImg 은 갱신하지 않음 → 재편집 시 항상 업로드 원본에서 새로 시작
      closeImageEditor();
      updateAll();
    };
    img.src = du;
  }, "image/png");
}

window.addEventListener("keydown",e=>{
  if(document.getElementById("ieOverlay").classList.contains("open")){
    if(e.key==="Enter"&&ie.tool==="crop"&&ie.crop.active){e.preventDefault();doCrop();}
    if(e.key==="Escape"&&ie.tool==="crop"&&ie.crop.active){e.preventDefault();ie.crop={active:false,sx:0,sy:0,ex:0,ey:0};ie.cropAction=null;ieRender();}
  }
});

function setPvMode(mode){
  document.body.dataset.pvMode=mode;
  localStorage.setItem("pvMode",mode);
  document.getElementById("pvStickyBtn").classList.toggle("active",mode==="sticky");
  document.getElementById("pvFloatBtn").classList.toggle("active",mode==="float");
  if(mode==="float")renderMiniPreview();
}
function renderMiniPreview(){
  const main=document.getElementById("preview"),mini=document.getElementById("previewMini");
  if(!main||!main.width)return;
  const boxW=98,boxH=68;
  const sc=Math.min(boxW/main.width,boxH/main.height);
  mini.width=Math.round(main.width*sc);mini.height=Math.round(main.height*sc);
  const mc=mini.getContext("2d");mc.imageSmoothingEnabled=true;mc.imageSmoothingQuality="high";
  mc.drawImage(main,0,0,mini.width,mini.height);
}
function openPvFull(){
  const overlay=document.getElementById("pvFull"),main=document.getElementById("preview"),full=document.getElementById("previewFull");
  full.width=main.width;full.height=main.height;
  full.getContext("2d").drawImage(main,0,0);
  overlay.classList.add("open");
}
function closePvFull(){document.getElementById("pvFull").classList.remove("open");}
// [수정 #9] 래퍼 제거됨 — renderPreview 내부에 미니 프리뷰 호출 통합 완료

// localStorage 자동 저장 (디바운스 400ms) — 테마, 등급, 텍스트 필드 등 직렬화 가능한 상태만 저장 (이미지 제외)
const SAVE_KEY="vdrc_save";
let _saveTimer=null;
function autoSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const d={themeKey:state.themeKey,starRating:state.starRating,eroRating:state.eroRating,ageRating:state.ageRating,progress:state.progress,reviewColor:state.reviewColor,showDate:state.showDate,spoiler:state.spoiler,fontSize:state.fontSize,qrUrl:state.qrUrl,
      title:document.getElementById("inTitle").value,circle:document.getElementById("inCircle").value,artist:document.getElementById("inArtist").value,genre:document.getElementById("inGenre").value,
      review:document.getElementById("inReview").value,reviewer:document.getElementById("inReviewer").value,headline:document.getElementById("inHeadline").value,lang:currentLang};
    try{localStorage.setItem(SAVE_KEY,JSON.stringify(d));}catch(e){}
  },400);
}
function autoLoad(){
  try{
    const raw=localStorage.getItem(SAVE_KEY);if(!raw)return;
    const d=JSON.parse(raw);
    if(d.themeKey)state.themeKey=d.themeKey;
    if(d.starRating)state.starRating=d.starRating;
    if(d.eroRating)state.eroRating=d.eroRating;
    if(d.ageRating)state.ageRating=d.ageRating;
    if(d.progress!=null){state.progress=d.progress;document.getElementById("progressSlider").value=d.progress;}
    if(d.reviewColor)state.reviewColor=d.reviewColor;
    if(d.showDate!=null){state.showDate=d.showDate;document.getElementById("chkDate").checked=d.showDate;}
    if(d.spoiler!=null){state.spoiler=d.spoiler;document.getElementById("chkSpoiler").checked=d.spoiler;}
    if(d.fontSize){state.fontSize=d.fontSize;document.getElementById("fontSizeSlider").value=d.fontSize;document.getElementById("fontSizeVal").textContent=d.fontSize+"px";}
    if(d.qrUrl){state.qrUrl=d.qrUrl;document.getElementById("inQR").value=d.qrUrl;}
    if(d.title)document.getElementById("inTitle").value=d.title;
    if(d.circle)document.getElementById("inCircle").value=d.circle;
    if(d.artist)document.getElementById("inArtist").value=d.artist;
    if(d.genre)document.getElementById("inGenre").value=d.genre;
    if(d.review)document.getElementById("inReview").value=d.review;
    if(d.reviewer)document.getElementById("inReviewer").value=d.reviewer;
    if(d.headline)document.getElementById("inHeadline").value=d.headline;
    if(d.lang)currentLang=d.lang;
  }catch(e){}
}

// [수정 #10] 중복 이벤트 리스너 제거 완료 — themeSelect/progressSlider/chkSpoiler/chkDate 모두 기존 핸들러에서 처리
