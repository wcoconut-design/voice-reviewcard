<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Review Card Maker</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#0c0c14;--surface:#16161e;--input:#1e1e2a;--border:rgba(255,255,255,0.08);--text:#e0e0e8;--sub:#6a6a80;--muted:#4e4e66;--accent:#a8c8e8;--scrollbar:rgba(255,255,255,0.15);--shadow:rgba(0,0,0,0.4);--active-text:#fff;--overlay:rgba(0,0,0,0.85)}
[data-theme="light"]{--bg:#f0f0f5;--surface:#fff;--input:#ededf3;--border:rgba(0,0,0,0.09);--text:#1a1a2e;--sub:#7a7a90;--muted:#a8a8be;--accent:#5a7a9a;--scrollbar:rgba(0,0,0,0.12);--shadow:rgba(0,0,0,0.06);--active-text:#1a1a2e;--overlay:rgba(0,0,0,0.45)}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);font-family:'Pretendard',-apple-system,sans-serif;color:var(--text);transition:background .3s,color .3s;overflow:hidden}
.wrap{height:100vh;max-width:1280px;margin:0 auto;padding:12px 18px;display:flex;flex-direction:column;gap:10px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-shrink:0}
.brand{display:flex;align-items:baseline;gap:10px;min-width:0;overflow:hidden}
.brand h1{font-size:15px;font-weight:800;letter-spacing:-0.01em;white-space:nowrap}
.brand p{font-size:11px;color:var(--sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-group{display:flex;gap:4px;align-items:center;flex-shrink:0}
.tb-sep{width:1px;height:18px;background:var(--border);margin:0 4px}
.t-btn{padding:5px 12px;border-radius:18px;font-size:11px;font-weight:700;cursor:pointer;background:var(--input);color:var(--sub);border:1px solid var(--border);transition:all .2s}
.t-btn.active{background:var(--text);color:var(--bg);border-color:var(--text)}
.t-btn-sm{padding:3px 9px;font-size:13px;line-height:1}
.layout{flex:1;display:grid;grid-template-columns:1fr 1.25fr;gap:20px;min-height:0}
@media(max-width:900px){
  body{overflow:auto}
  .wrap{height:auto;min-height:100vh;padding:12px 14px 30px}
  .layout{grid-template-columns:1fr;display:flex;flex-direction:column;gap:12px;overflow:visible}
  .preview-wrap{order:-1;position:sticky;top:0;background:var(--bg);padding:6px 0 10px;z-index:10;border-bottom:1px solid var(--border);align-items:center}
  #preview{max-height:42vh;width:auto;max-width:100%}
  .editor{overflow:visible;min-height:auto;flex:none}
  body[data-pv-mode="float"] .preview-wrap{display:none}
  body[data-pv-mode="float"] .pv-mini{display:flex}
  body[data-pv-mode="float"] .wrap{padding-bottom:14px}
  .pv-mode-switch{display:flex}
}
.pv-mode-switch{display:none;gap:3px;align-items:center}
.pv-mode-switch .t-btn{padding:5px 9px;font-size:13px}
.pv-mini{display:none;position:fixed;bottom:18px;right:18px;width:108px;height:78px;border-radius:12px;background:var(--surface);box-shadow:0 10px 30px var(--shadow);border:1.5px solid var(--accent);cursor:pointer;z-index:50;overflow:hidden;align-items:center;justify-content:center;padding:5px;transition:transform .2s ease,box-shadow .2s ease}
.pv-mini:hover,.pv-mini:active{transform:scale(1.05);box-shadow:0 14px 36px var(--shadow)}
.pv-mini canvas{max-width:100%;max-height:100%;display:block;border-radius:6px}
.pv-mini::after{content:"⛶";position:absolute;top:4px;right:4px;font-size:10px;color:#fff;background:rgba(0,0,0,0.55);width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-weight:700}
.pv-full{display:none;position:fixed;inset:0;background:var(--overlay);backdrop-filter:blur(8px);z-index:9500;justify-content:center;align-items:center;padding:20px;flex-direction:column;gap:10px;opacity:0;transition:opacity .25s ease}
.pv-full.open{display:flex;opacity:1}
.pv-full canvas{max-width:100%;max-height:calc(100vh - 100px);border-radius:14px;box-shadow:0 14px 50px var(--shadow);display:block;transform:translateY(8px);transition:transform .25s ease}
.pv-full.open canvas{transform:translateY(0)}
.pv-full-close{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface);color:var(--text);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;align-self:flex-end;box-shadow:0 4px 12px var(--shadow)}
/* 에디터 내부 패딩 넓히기 에디터 박스 자체의 스크롤바 유연하게 대처 */
.editor{background:var(--surface);border-radius:14px;padding:16px 20px;border:1px solid var(--border);overflow-y:auto;transition:background .3s;height:100%;box-sizing:border-box;display:flex;flex-direction:column;scrollbar-width:thin}
.editor::-webkit-scrollbar{width:6px}.editor::-webkit-scrollbar-track{background:transparent}.editor::-webkit-scrollbar-thumb{background-color:var(--scrollbar);border-radius:3px}
/* 인풋 창들 사이의 상하좌우 간격도 패딩에 맞춰 넓히기 상하 여백에 맞춰 내부 그리드가 튀어나가지 않게 다듬기 */
.editor-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 16px;flex:none}
.editor-grid .full{grid-column:1/-1}
  
/* 인풋 폼 스타일 (통합) */
input[type=text],select,textarea{width:100%;background:var(--input);border:1px solid var(--border);border-radius:7px;padding:5px 8px;font-size:12px;color:var(--text);font-family:inherit;outline:none;transition:all .2s ease}
textarea{resize:none;line-height:1.5}
::placeholder{color:var(--muted)}

/* 클릭 시 부드럽고 은은한 네온 효과 */
input[type=text]:focus, select:focus, textarea:focus {
  border-color: var(--accent) !important;
  box-shadow: 0 0 0 3px rgba(168, 200, 232, 0.2);
  background: var(--input);
}

.preview-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:0;min-width:0;gap:8px}
.pv-nav{display:none;align-items:center;gap:12px;padding:4px 0}
.pv-nav.show{display:flex}
.pv-nav-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--border);background:var(--input);color:var(--text);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.pv-nav-btn:hover{background:var(--accent);color:var(--bg)}
.pv-nav-btn:disabled{opacity:0.3;cursor:default;background:var(--input);color:var(--sub)}
.pv-nav-ind{font-size:12px;font-weight:700;color:var(--sub);min-width:40px;text-align:center}
#preview{max-height:calc(100vh - 60px);max-width:100%;width:auto;height:auto;border-radius:14px;box-shadow:0 8px 40px var(--shadow);display:block}
label{display:block;font-size:10px;font-weight:600;color:var(--sub);margin-bottom:2px;letter-spacing:-0.01em}
.field{margin:0}
.thumb-row{display:flex;gap:6px;align-items:stretch}
.thumb-box{border:1.5px dashed var(--border);border-radius:9px;padding:4px 8px;text-align:center;cursor:pointer;background:var(--input);display:flex;align-items:center;justify-content:center;gap:8px;min-height:40px;flex:1;min-width:0}
.thumb-row:has(.thumb-actions.show) .thumb-box{flex:1 1 auto;padding:6px}
.thumb-box span{font-size:12px;color:var(--sub)}
.thumb-preview{width:32px;height:32px;border-radius:5px;object-fit:cover}
.thumb-row:has(.thumb-actions.show) .thumb-preview{width:88px;height:88px;border-radius:8px}
.thumb-row:has(.thumb-actions.show) #thumbLabel>span{display:none}
.thumb-actions{display:none;gap:4px;flex:0 1 auto;align-items:stretch}
.thumb-actions.show{display:flex}
.thumb-act-btn{flex:0 0 auto;padding:4px 6px;border-radius:7px;font-size:10px;font-weight:700;cursor:pointer;background:var(--input);color:var(--accent);border:1px solid rgba(128,160,200,0.2);text-align:center;transition:all .15s;display:flex;align-items:center;justify-content:center;line-height:1.2;white-space:nowrap;flex-direction:column;gap:2px;width:46px}
.thumb-act-btn .ic{font-size:16px;line-height:1}
.thumb-act-btn .tx{font-size:9px;font-weight:600}
.thumb-act-btn:hover{opacity:.8}
.thumb-act-del{color:#e74c3c;border-color:rgba(231,76,60,0.25)}.thumb-act-del:hover{background:rgba(231,76,60,0.08)}
.rating-row{display:flex;gap:3px}
.rating-btn{flex:1;padding:4px 0;border-radius:6px;font-size:10px;font-weight:700;cursor:pointer;background:var(--input);color:var(--sub);border:1px solid var(--border);text-align:center;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rating-btn.active-none{border:1.5px solid #718093;background:rgba(113,128,147,0.15);color:var(--active-text)}
.rating-btn.active-all{border:1.5px solid #2ecc71;background:rgba(46,204,113,0.15);color:var(--active-text)}
.rating-btn.active-r15{border:1.5px solid #e67e22;background:rgba(230,126,34,0.15);color:var(--active-text)}
.rating-btn.active-r18{border:1.5px solid #e74c3c;background:rgba(231,76,60,0.15);color:var(--active-text)}
.export-btn{padding:8px 0;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;color:#fff}
.btn-row{display:flex;gap:6px;align-items:stretch}
.reset-btn{padding:9px 14px;border:1px solid var(--border);border-radius:9px;font-size:13px;cursor:pointer;background:var(--input);color:var(--sub);transition:all .15s}
.reset-btn:hover{background:rgba(231,76,60,0.1);color:#e74c3c;border-color:rgba(231,76,60,0.3)}
.color-grid{display:flex;gap:4px;flex-wrap:wrap;background:var(--input);padding:5px;border-radius:7px;border:1px solid var(--border)}
.color-swatch{width:17px;height:17px;border-radius:4px;cursor:pointer;border:1px solid rgba(0,0,0,0.15);transition:transform .15s,box-shadow .15s}
.color-swatch.active{border:2px solid var(--text);box-shadow:0 0 6px var(--shadow);transform:scale(1.1)}
.color-swatch:hover{transform:scale(1.15)}
.color-swatch-auto{background:conic-gradient(from 45deg,#fff 0deg 90deg,#444 90deg 180deg,#fff 180deg 270deg,#444 270deg 360deg) !important;position:relative}
.color-swatch-auto::after{content:"A";position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;color:var(--accent);background:var(--input);border-radius:50%;width:11px;height:11px;margin:auto;line-height:1}
.editor-credit{text-align:center;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:6px}
.check-label{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--sub);cursor:pointer;margin:0}
.check-label input[type=checkbox]{width:14px;height:14px;accent-color:var(--accent);cursor:pointer}
.pv-overflow{display:none;padding:7px 12px;border-radius:7px;font-size:11px;font-weight:600;background:rgba(230,126,34,0.12);color:#e67e22;border:1px solid rgba(230,126,34,0.25);text-align:center}
.pv-overflow.show{display:block}
input[type=range]{-webkit-appearance:none;appearance:none;width:100%;background:transparent;cursor:pointer;outline:none;padding:6px 0}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:var(--input);border:1px solid var(--border)}
input[type=range]::-moz-range-track{height:4px;border-radius:2px;background:var(--input);border:1px solid var(--border)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);box-shadow:0 1px 4px var(--shadow);margin-top:-7px;transition:transform .15s ease,box-shadow .15s ease}
input[type=range]::-moz-range-thumb{width:16px;height:16px;border-radius:50%;background:var(--accent);border:2px solid var(--surface);box-shadow:0 1px 4px var(--shadow);transition:transform .15s ease,box-shadow .15s ease}
input[type=range]:hover::-webkit-slider-thumb,input[type=range]:active::-webkit-slider-thumb{transform:scale(1.2);box-shadow:0 2px 8px var(--shadow)}
input[type=range]:hover::-moz-range-thumb,input[type=range]:active::-moz-range-thumb{transform:scale(1.2);box-shadow:0 2px 8px var(--shadow)}
.ie-overlay{display:none;position:fixed;inset:0;background:var(--overlay);z-index:9999;justify-content:center;align-items:center;backdrop-filter:blur(8px);opacity:0;transition:opacity .25s ease}
.ie-overlay.open{display:flex;opacity:1}
.ie-modal{background:var(--surface);border-radius:18px;border:1px solid var(--border);width:95vw;max-width:720px;max-height:95vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 60px var(--shadow);transform:translateY(8px);transition:transform .25s ease}
.ie-overlay.open .ie-modal{transform:translateY(0)}
.ie-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px}
.ie-header h2{font-size:14px;font-weight:700;letter-spacing:-0.01em}
.ie-close{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--sub);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s}
.ie-close:hover{background:var(--input);color:var(--text)}
.ie-toolbar{display:flex;gap:2px;padding:4px 14px 12px;flex-wrap:wrap;align-items:center}
.ie-tool-btn{padding:7px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--sub);border:none;transition:background .15s,color .15s;white-space:nowrap}
.ie-tool-btn:hover{color:var(--text);background:var(--input)}
.ie-tool-btn.active{background:var(--input);color:var(--accent)}
.ie-separator{width:1px;height:18px;background:var(--border);margin:0 6px;opacity:.6}
.ie-opts{display:flex;align-items:center;gap:8px;margin-left:auto;flex-wrap:wrap}
.ie-opts label{font-size:11px;color:var(--sub);margin:0;font-weight:600}
.ie-opts input[type=range]{width:88px;padding:6px 0}
.ie-opts span{font-size:11px;color:var(--accent);font-weight:700;min-width:32px;text-align:right}
.ie-canvas-wrap{flex:1;overflow:auto;display:flex;justify-content:center;align-items:center;padding:14px;background:var(--bg);position:relative;min-height:240px}
.ie-canvas-wrap canvas{border-radius:8px;cursor:crosshair;max-width:100%;max-height:60vh;touch-action:none}
@media(max-width:600px){
  .ie-modal{max-height:96vh;border-radius:14px;width:100vw}
  .ie-header{padding:10px 14px}
  .ie-header h2{font-size:13px}
  .ie-toolbar{padding:2px 8px 8px;gap:0;justify-content:flex-start}
  .ie-tool-btn{padding:6px 9px;font-size:11px}
  .ie-separator{margin:0 3px}
  .ie-opts{margin-left:0;width:100%;padding:6px 0 0;justify-content:flex-start}
  .ie-canvas-wrap{padding:10px;min-height:180px}
  .ie-canvas-wrap canvas{max-height:48vh}
  .ie-footer{padding:10px 14px}
  .ie-btn{padding:8px 18px;font-size:12px}
  .ie-filter-panel{padding:6px 14px 10px;gap:4px 10px}
  .ie-filter-cell label{min-width:30px;font-size:10px}
  .ie-filter-cell span{min-width:26px;font-size:10px}
}
.ie-footer{display:flex;gap:8px;padding:12px 18px;justify-content:flex-end}
.ie-btn{padding:9px 22px;border-radius:9px;font-size:12.5px;font-weight:700;cursor:pointer;border:none;transition:background .15s,opacity .15s,box-shadow .15s}
.ie-btn-cancel{background:transparent;color:var(--sub)}.ie-btn-cancel:hover{background:var(--input);color:var(--text)}
.ie-btn-apply{background:var(--accent);color:var(--bg)}.ie-btn-apply:hover{filter:brightness(1.08);box-shadow:0 4px 14px var(--shadow)}
.ie-btn-sm{padding:6px 10px;border-radius:7px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:transparent;color:var(--sub);transition:background .15s,color .15s}
.ie-btn-sm:hover{background:var(--input);color:var(--text)}
.ie-btn-sm.active{background:var(--input);color:var(--accent)}
.ie-btn-sm.danger{color:#e74c3c}
.ie-btn-sm.danger:hover{background:rgba(231,76,60,0.08);color:#e74c3c}
.ie-crop-hint{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,0.65);color:#fff;font-size:11px;padding:5px 12px;border-radius:14px;pointer-events:none;white-space:nowrap;font-weight:500}
.ie-filter-panel{padding:8px 18px 12px;display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}
.ie-filter-cell{display:flex;align-items:center;gap:6px}
.ie-filter-cell label{min-width:34px;text-align:left;font-size:10.5px;color:var(--sub);font-weight:600;margin:0;white-space:nowrap}
.ie-filter-cell input[type=range]{flex:1;padding:5px 0;min-width:0}
.ie-filter-cell span{min-width:28px;font-size:10.5px;color:var(--accent);font-weight:700;text-align:right}
</style>
<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><h1 id="headerTitle">🎧 Voice Drama Review Card</h1><p id="headerSub">플레이어 스타일 메이커</p></div>
    <div class="tb-group">
      <div class="pv-mode-switch" role="group" aria-label="미리보기 위치">
        <button class="t-btn active" id="pvStickyBtn" onclick="setPvMode('sticky')" title="상단 고정">📌</button>
        <button class="t-btn" id="pvFloatBtn" onclick="setPvMode('float')" title="플로팅 미니">🪟</button>
        <div class="tb-sep"></div>
      </div>
      <button class="t-btn active" id="btnKo" onclick="setLanguage('ko')">한국어</button>
      <button class="t-btn" id="btnJa" onclick="setLanguage('ja')">日本語</button>
      <div class="tb-sep"></div>
      <button class="t-btn t-btn-sm" id="tmDark" onclick="setThemeMode('dark')">🌙</button>
      <button class="t-btn t-btn-sm" id="tmLight" onclick="setThemeMode('light')">☀️</button>
    </div>
  </div>
  <div class="layout">
    <div class="editor">
      <div class="editor-grid">
        <div class="field full"><label id="lblTheme">테마</label><select id="themeSelect"></select></div>
        <div class="field full"><label id="lblThumb">썸네일</label>
          <div class="thumb-row">
            <div class="thumb-box" id="thumbBox" onclick="document.getElementById('fileInput').click()"><input type="file" id="fileInput" accept="image/*" style="display:none"><span id="thumbLabel">클릭하여 업로드</span></div>
            <div class="thumb-actions" id="thumbActions">
              <button class="thumb-act-btn" onclick="openImageEditor()"><span class="ic">✂️</span><span class="tx">편집</span></button>
              <button class="thumb-act-btn" onclick="document.getElementById('fileInput').click()"><span class="ic">🔄</span><span class="tx">변경</span></button>
              <button class="thumb-act-btn thumb-act-del" onclick="removeThumb()"><span class="ic">🗑</span><span class="tx">제거</span></button>
            </div>
          </div>
        </div>
        <div class="field full"><label id="lblTitle">작품 제목</label><input type="text" id="inTitle" placeholder="작품 제목을 입력하세요"></div>
        <div class="field"><label id="lblCircle">서클명</label><input type="text" id="inCircle" placeholder="서클명"></div>
        <div class="field"><label id="lblArtist">성우명</label><input type="text" id="inArtist" placeholder="CV. 성우명"></div>
        <div class="field"><label id="lblGenre">장르 · 키워드</label><input type="text" id="inGenre" placeholder="로맨스, 힐링, 달달"></div>
        <div class="field"><label id="lblRating">등급</label><div class="rating-row" id="ratingRow"></div></div>
        <div class="field"><label id="lblStar">작품 별점</label><div class="rating-row" id="starSelectRow"></div></div>
        <div class="field"><label id="lblHeart">수위 · 농도</label><div class="rating-row" id="heartSelectRow"></div></div>
        <div class="field"><label id="lblSlider">재생 바 위치</label><input type="range" id="progressSlider" min="0" max="1" step="0.01" value="0.55"></div>
        <div class="field"><label id="lblQR">작품 링크(QR)</label><input type="text" id="inQR" placeholder="https://..."></div>
        <div class="field full"><label id="lblHeadline">한줄 코멘트</label><input type="text" id="inHeadline" placeholder="이 작품은 꼭 들어보세요!"></div>

function setThemeMode(mode, isUserClick = true){
  // 사용자가 직접 버튼을 클릭했을 때만 세션을 저장
  if (isUserClick) {
    localStorage.setItem('siteTheme', mode);
  }
  document.querySelectorAll('#tmDark,#tmLight').forEach(b=>b.classList.remove('active'));
  const targetBtn = document.getElementById(mode==='dark'?'tmDark':'tmLight');
  if (targetBtn) targetBtn.classList.add('active');
  document.documentElement.setAttribute('data-theme', mode);
}

(function(){
  // 1. 기존 사용자의 수동 테마 지정 기록이 있는지 확인
  let saved = localStorage.getItem('siteTheme');
  
  // 2. 기록이 없다면 디바이스 시스템의 설정을 확인 (다크/라이트)
  if (!saved) {
    const isSystemLight = window.matchMedia('(prefers-color-scheme: light)').matches;
    saved = isSystemLight ? 'light' : 'dark';
  }
  
  // 3. 첫 로드이므로 수동 저장이 안 되게 false를 주어 테마 적용
  setThemeMode(saved, false);
})();

window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
  if (!localStorage.getItem('siteTheme')) {
    setThemeMode(e.matches ? 'dark' : 'light', false);
  }
});

function drawRR(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}
function wrapLines(ctx,t,mW){const ls=[];for(const p of t.split("\n")){if(!p.trim()){ls.push("");continue;}let l="";for(const c of p){const x=l+c;if(ctx.measureText(x).width>mW&&l.length){ls.push(l);l=c;}else l=x;}if(l)ls.push(l);}return ls;}
function drawWrap(ctx,t,x,y,mW,lh,mL){const a=wrapLines(ctx,t,mW),ls=a.slice(0,mL);if(a.length>mL)ls[mL-1]=ls[mL-1].slice(0,-2)+"…";for(let i=0;i<ls.length;i++)ctx.fillText(ls[i],x,y+i*lh);return ls.length;}

const _measureCanvas=document.createElement("canvas");_measureCanvas.width=CARD_W;_measureCanvas.height=100;
const _measureCtx=_measureCanvas.getContext("2d");

function getReviewLayout(){
  const c=_measureCtx,v=getV(),rvW=CARD_W-160;
  c.font="400 "+state.fontSize+"px 'Pretendard',sans-serif";
  const allLines=wrapLines(c,v.review||"",rvW);
  const fH=footerH();
  const p1Full=calcP1H(allLines.length||1);
  if(p1Full<=MAX_PAGE_H) return{lines:allLines,pages:[{start:0,count:allLines.length||1,h:p1Full}],overflow:false};
  const p1Max=Math.max(1,Math.floor((MAX_PAGE_H-TOP_H-REVIEW_GAP-headlineH()-fH-PAGE_PAD_BOTTOM)/reviewLH()));
  const contMax=Math.max(1,Math.floor((MAX_PAGE_H-CONT_TOP_PAD-fH-PAGE_PAD_BOTTOM)/reviewLH()));
  const pages=[{start:0,count:Math.min(allLines.length,p1Max),h:MAX_PAGE_H}];
  let used=pages[0].count;
  while(used<allLines.length&&pages.length<MAX_PAGES){
    const rem=allLines.length-used;
    const cnt=Math.min(rem,contMax);
    pages.push({start:used,count:cnt,h:MAX_PAGE_H});
    used+=cnt;
  }
  return{lines:allLines,pages:pages,overflow:used<allLines.length};
}

function resolveReviewColor(panelIsDark,t,isL){
  if(state.reviewColor==="auto")return t?t.text:(panelIsDark?"rgba(255,255,255,0.92)":"rgba(0,0,0,0.85)");
  return state.reviewColor;
}

function drawBg(ctx,W,H,t,isL,unified,topH){
  const gradH=unified?H:topH;
  const bg=ctx.createLinearGradient(0,0,W,gradH);bg.addColorStop(0,t.bg1);bg.addColorStop(1,t.bg2);ctx.fillStyle=bg;ctx.fillRect(0,0,W,gradH);
  ctx.save();ctx.globalAlpha=isL?.04:.07;
  const g1=ctx.createRadialGradient(W*0.25,topH*0.22,0,W*0.25,topH*0.22,W*0.55);g1.addColorStop(0,"#fff");g1.addColorStop(1,"rgba(255,255,255,0)");ctx.fillStyle=g1;ctx.fillRect(0,0,W,topH);
  const g2=ctx.createRadialGradient(W*0.78,topH*0.85,0,W*0.78,topH*0.85,W*0.5);g2.addColorStop(0,"#fff");g2.addColorStop(1,"rgba(255,255,255,0)");ctx.fillStyle=g2;ctx.fillRect(0,0,W,topH);
  ctx.restore();
}

function drawFooter(ctx,v,t,isL,unified,rvX,rvW,H,textEndY){
  const hasR=!!v.reviewer, hasD=state.showDate;
  if(!hasR&&!hasD)return;
  let cy=textEndY+28;
  if(hasR){
    ctx.font="500 16px 'Pretendard',sans-serif";
    if(unified)ctx.fillStyle=isL?"rgba(0,0,0,0.5)":"rgba(255,255,255,0.55)";
    else ctx.fillStyle="rgba(255,255,255,0.45)";
    ctx.textAlign="right";ctx.fillText(v.reviewer,rvX+rvW,cy);ctx.textAlign="left";
    cy+=24;
  }
  if(hasD){
    const now=new Date(),ds=now.getFullYear()+"."+(now.getMonth()+1).toString().padStart(2,"0")+"."+now.getDate().toString().padStart(2,"0");
    ctx.font="500 13px 'Pretendard',sans-serif";
    if(unified)ctx.fillStyle=isL?"rgba(0,0,0,0.3)":"rgba(255,255,255,0.35)";
    else ctx.fillStyle="rgba(255,255,255,0.3)";
    ctx.textAlign="right";ctx.fillText(ds,rvX+rvW,cy);ctx.textAlign="left";
  }
}

function drawPageIndicator(ctx,W,H,t,cur,total){
  if(total<=1)return;
  ctx.font="600 12px 'Pretendard',sans-serif";ctx.fillStyle=t.accent;ctx.globalAlpha=0.3;
  ctx.textAlign="center";ctx.fillText(cur+" / "+total,W/2,H-16);ctx.textAlign="left";ctx.globalAlpha=1;
}

let _qrCache={url:"",img:null};
function genQR(url){
  if(!url)return null;
  if(_qrCache.url===url&&_qrCache.img)return _qrCache.img;
  try{
    const qr=qrcode(0,"M");qr.addData(url);qr.make();
    const size=qr.getModuleCount(),px=4,cvs=document.createElement("canvas");
    cvs.width=cvs.height=size*px;const c=cvs.getContext("2d");
    c.fillStyle="#fff";c.fillRect(0,0,cvs.width,cvs.height);
    c.fillStyle="#000";
    for(let r=0;r<size;r++)for(let col=0;col<size;col++)if(qr.isDark(r,col))c.fillRect(col*px,r*px,px,px);
    _qrCache={url,img:cvs};return cvs;
  }catch(e){return null;}
}
function drawQR(ctx,t,isL,x,y,size){
  const qrImg=genQR(state.qrUrl);if(!qrImg)return;
  const pad=6,full=size+pad*2;
  drawRR(ctx,x-pad,y-pad,full,full,8);
  ctx.fillStyle="#fff";ctx.fill();
  ctx.strokeStyle=isL?"rgba(0,0,0,0.1)":"rgba(255,255,255,0.15)";ctx.lineWidth=1;ctx.stroke();
  ctx.drawImage(qrImg,x,y,size,size);
}

function drawSpoiler(ctx,t,isL,unified,x,y){
  if(!state.spoiler)return;
  const bTxt=currentLang==="ja"?"⚠ ネタバレ注意":"⚠ 스포일러 주의";
  ctx.font="700 13px 'Pretendard',sans-serif";
  const bw=ctx.measureText(bTxt).width+18,bh=24;
  drawRR(ctx,x,y,bw,bh,6);
  ctx.fillStyle="rgba(231,76,60,0.15)";ctx.fill();
  ctx.strokeStyle="rgba(231,76,60,0.4)";ctx.lineWidth=1;ctx.stroke();
  ctx.fillStyle="#e74c3c";ctx.fillText(bTxt,x+9,y+16);
}

function drawPage1(ctx,W,H,layout){
  const t=THEME_MAP[state.themeKey],v=getV(),isL=state.themeKey==="white",prog=state.progress;
  const unified=UNIFIED_THEMES.includes(state.themeKey);
  const topH=480,pg=layout.pages[0],total=layout.pages.length;
  drawBg(ctx,W,H,t,isL,unified,topH);
  
  // 썸네일 박스 드로잉
  const ts=380,tx=60,ty=60,pad=6;
  drawRR(ctx,tx,ty,ts,ts,28);
  const fg=ctx.createLinearGradient(tx,ty,tx+ts,ty+ts);
  fg.addColorStop(0,isL?"rgba(0,0,0,0.025)":"rgba(255,255,255,0.09)");
  fg.addColorStop(1,isL?"rgba(0,0,0,0.005)":"rgba(255,255,255,0.02)");
  ctx.fillStyle=fg;ctx.fill();
  const itx=tx+pad,ity=ty+pad,its=ts-pad*2;
  ctx.save();drawRR(ctx,itx,ity,its,its,22);ctx.clip();
  if(state.thumbImg){
    const img=state.thumbImg,sc=Math.max(its/img.width,its/img.height),sw=img.width*sc,sh=img.height*sc;
    ctx.drawImage(img,itx+(its-sw)/2,ity+(its-sh)/2,sw,sh);
  } else {
    ctx.fillStyle=isL?"rgba(0,0,0,0.25)":"rgba(255,255,255,0.35)";ctx.font="500 16px 'Pretendard',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("📷",itx+its/2,ity+its/2-12);ctx.font="500 13px 'Pretendard',sans-serif";ctx.fillText(currentLang==="ja"?"画像をアップロード":"이미지를 올려주세요",itx+its/2,ity+its/2+14);ctx.textAlign="left";ctx.textBaseline="alphabetic";
  }
  ctx.restore();
  drawRR(ctx,itx,ity,its,its,22);ctx.strokeStyle=isL?"rgba(0,0,0,0.04)":"rgba(0,0,0,0.1)";ctx.lineWidth=1;ctx.stroke();
  drawRR(ctx,tx,ty,ts,ts,28);ctx.strokeStyle=isL?"rgba(0,0,0,0.05)":"rgba(255,255,255,0.09)";ctx.lineWidth=1;ctx.stroke();
  
  // 우측 오디오 플레이어 영역 좌표 설정
  const rX=tx+ts+44,rW=W-rX-60,rCX=rX+rW/2;
  
  /* ========================================================
     [구역 1: 상단 정보 블록 - 글자수 제한 및 말줄임표 보정]
     ======================================================== */
  const tTop=ty+32; // [보정] 시작 줄을 이전처럼 조금 아래로 내려서 썸네일과 정렬 맞춤
  ctx.font="700 32px 'Pretendard',sans-serif";ctx.fillStyle=t.text;ctx.textAlign="left";
  
  // 1. 제목 그리기 (최대 2줄 제한, 넘어가면 자동으로 뒤에 ... 붙음)
  const tl=drawWrap(ctx,v.title,rX,tTop,rW,40,2);
  
  // 2. 써클명 / 성우명 정보 결합 및 1줄 글자 제한(...) 처리
  const aT=tTop+(tl*40)+10;
  ctx.font="500 20px 'Pretendard',sans-serif";ctx.fillStyle=t.sub;
  let meta=[v.circle,v.artist].filter(s=>s&&s.trim()).join(" \u00b7 ");
  if(meta){
    if(ctx.measureText(meta).width>rW){
      while(meta.length>0&&ctx.measureText(meta+"...").width>rW){meta=meta.slice(0,-1);}
      meta+="...";
    }
    ctx.fillText(meta,rX,aT);
  }
  
  // 3. 평점 및 등급 배지 레이어
  const iY=aT+38;
  const badge=state.ageRating;let sX=rX;
  if(badge!=="\uc120\ud0dd\uc548\ud568"){
    ctx.font="700 12px 'Pretendard',sans-serif";
    const bt=currentLang==="ja"?I18N.ja.ratings[I18N.ko.ratings.indexOf(badge)]:badge;
    const bW=ctx.measureText(bt).width+16;drawRR(ctx,rX,iY-14,bW,22,11);
    if(badge==="\uc804\uc5f0\ub839")ctx.fillStyle="#2ecc71";
    else if(badge==="R15")ctx.fillStyle="#e67e22";
    else if(badge==="R18")ctx.fillStyle="#e74c3c";
    ctx.fill();ctx.fillStyle="#fff";ctx.fillText(bt,rX+8,iY+2);sX=rX+bW+18;
  }
  if(state.starRating!=="\uc120\ud0dd\uc548\ud568"){
    ctx.font="17px sans-serif";ctx.fillStyle="#ffb432";ctx.fillText("\u2605",sX,iY+2);
    ctx.font="600 16px 'Pretendard',sans-serif";ctx.fillStyle=t.text;ctx.fillText(state.starRating,sX+20,iY+1);
    sX+=20+ctx.measureText(state.starRating).width+18;
  }
  if(state.eroRating!=="\uc120\ud0dd\uc548\ud568"){
    const hc=parseInt(state.eroRating.replace("\u2764 ",""));ctx.font="17px sans-serif";ctx.fillStyle="#ff6b6b";
    let hs="";for(let i=0;i<hc;i++)hs+="\u2665";ctx.fillText(hs,sX,iY+2);
  }
  
  // 4. 장르 태그 1줄 글자 제한(...) 처리
  if(v.genre){
    const gY=iY+38;
    ctx.font="600 15px 'Pretendard',sans-serif";ctx.fillStyle=t.accent;
    let tags=v.genre.split(/[,，、·]/).map(s=>s.trim()).filter(Boolean).map(s=>s.startsWith("#")?s:"#"+s).join("  ");
    if(ctx.measureText(tags).width>rW){
      while(tags.length>0&&ctx.measureText(tags+"...").width>rW){tags=tags.slice(0,-1);}
      tags+="...";
    }
    ctx.fillText(tags,rX,gY);
  }
  
  /* ========================================================
     [구역 2: 하단 기기 컨트롤러 블록 - 항상 고정된 하단 위치]
     ======================================================== */
  const bY=ty+255; 
  drawRR(ctx,rX,bY,rW,4,2);ctx.fillStyle=t.progressBg;ctx.fill();
  drawRR(ctx,rX,bY,rW*prog,4,2);ctx.fillStyle=t.progressFill;ctx.fill();
  ctx.beginPath();ctx.arc(rX+rW*prog,bY+2,7,0,Math.PI*2);ctx.fillStyle=t.progressFill;ctx.fill();
  
  const dur=1200,cur=dur*prog,rem=dur-cur;
  ctx.font="500 13px 'Pretendard',monospace,sans-serif";ctx.fillStyle=t.sub;
  ctx.textAlign="left";ctx.fillText(formatTime(cur),rX,bY+24);
  ctx.textAlign="right";ctx.fillText("-"+formatTime(rem),rX+rW,bY+24);ctx.textAlign="left";
  
  const ctY=bY+70;ctx.textAlign="center";ctx.fillStyle=t.ctrl;ctx.font="500 32px 'Pretendard',sans-serif";
  ctx.fillText("\u25c0",rCX-66,ctY);
  drawRR(ctx,rCX-12,ctY-24,8,28,3);ctx.fill();drawRR(ctx,rCX+4,ctY-24,8,28,3);ctx.fill();
  ctx.fillText("\u25b6",rCX+66,ctY);ctx.textAlign="left";
  
  // QR 코드 위치 고정
  drawQR(ctx,t,isL,rX+rW-44,topH-72,42);
  
  // 리뷰 텍스트 컴포넌트 렌더링 구역 (하단 패널)
  const panelIsDark=unified?(!isL):true;
  if(!unified){ctx.fillStyle=isL?"#fafaf7":"#14141c";ctx.fillRect(0,topH,W,H-topH);}
  ctx.strokeStyle=isL?"rgba(0,0,0,0.08)":"rgba(255,255,255,0.09)";ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(80,topH);ctx.lineTo(W-80,topH);ctx.stroke();
  
  const rvX=80,rvW=W-160;
  ctx.font="700 60px Georgia,serif";ctx.fillStyle=t.accent;ctx.globalAlpha=unified?1:0.7;
  ctx.textBaseline="top";ctx.fillText("\u201c",rvX-6,topH+18);ctx.textBaseline="alphabetic";ctx.globalAlpha=1;
  
  let cY=topH+REVIEW_GAP;
  if(v.headline){
    ctx.font="700 26px 'Pretendard',sans-serif";ctx.fillStyle=t.accent;
    drawWrap(ctx,v.headline,rvX,cY,rvW,34,1);cY+=40;
  }
  ctx.font="400 "+state.fontSize+"px 'Pretendard',sans-serif";
  ctx.fillStyle=unified?resolveReviewColor(!isL,t,isL):resolveReviewColor(true,t,isL);
  const pLines=layout.lines.slice(pg.start,pg.start+pg.count);
  const acLineTop=cY-10,acLineBot=cY+pLines.length*reviewLH()-10;
  ctx.save();ctx.globalAlpha=unified?0.25:0.45;ctx.strokeStyle=t.accent;ctx.lineWidth=2.5;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(rvX-16,acLineTop);ctx.lineTo(rvX-16,acLineBot);ctx.stroke();ctx.restore();
  for(let i=0;i<pLines.length;i++)ctx.fillText(pLines[i],rvX,cY+i*reviewLH());
  
  const textEndY=cY+pLines.length*reviewLH();
  drawSpoiler(ctx,t,isL,unified,rvX+rvW-120,topH+24);
  drawFooter(ctx,v,t,isL,unified,rvX,rvW,H,textEndY);
  if(total>1){
    ctx.font="500 14px 'Pretendard',sans-serif";ctx.fillStyle=t.accent;ctx.globalAlpha=0.5;
    ctx.textAlign="right";ctx.fillText("\u25b8\u25b8",rvX+rvW,H-PAGE_PAD_BOTTOM+10);ctx.textAlign="left";ctx.globalAlpha=1;
  }
  drawPageIndicator(ctx,W,H,t,1,total);
  ctx.font="500 10px 'Pretendard',sans-serif";ctx.fillStyle=t.accent;ctx.globalAlpha=0.08;
  ctx.textAlign="right";ctx.fillText("© wcoconut",W-30,H-8);ctx.textAlign="left";ctx.globalAlpha=1;
}

function drawContPage(ctx,W,H,layout,pageIdx){
  const t=THEME_MAP[state.themeKey],v=getV(),isL=state.themeKey==="white";
  const unified=UNIFIED_THEMES.includes(state.themeKey);
  const pg=layout.pages[pageIdx],total=layout.pages.length;
  if(unified){
    const bg=ctx.createLinearGradient(0,0,W,H);bg.addColorStop(0,t.bg1);bg.addColorStop(1,t.bg2);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle=isL?"#fafaf7":"#14141c";ctx.fillRect(0,0,W,H);
  }
  ctx.strokeStyle=t.accent;ctx.globalAlpha=unified?0.15:0.25;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(80,0);ctx.lineTo(W-80,0);ctx.stroke();ctx.globalAlpha=1;
  const rvX=80,rvW=W-160;
  ctx.font="700 48px Georgia,serif";ctx.fillStyle=t.accent;ctx.globalAlpha=unified?0.15:0.35;
  ctx.textBaseline="top";ctx.fillText("\u201c",rvX-6,CONT_TOP_PAD-56);ctx.textBaseline="alphabetic";ctx.globalAlpha=1;
  const acLineTop=CONT_TOP_PAD-10,acLineBot=CONT_TOP_PAD+pg.count*reviewLH()-10;
  ctx.save();ctx.globalAlpha=unified?0.25:0.45;ctx.strokeStyle=t.accent;ctx.lineWidth=2.5;ctx.lineCap="round";
  ctx.beginPath();ctx.moveTo(rvX-16,acLineTop);ctx.lineTo(rvX-16,acLineBot);ctx.stroke();ctx.restore();
  let cY=CONT_TOP_PAD;
  ctx.font="400 "+state.fontSize+"px 'Pretendard',sans-serif";
  ctx.fillStyle=unified?resolveReviewColor(!isL,t,isL):resolveReviewColor(true,t,isL);
  const pLines=layout.lines.slice(pg.start,pg.start+pg.count);
  for(let i=0;i<pLines.length;i++)ctx.fillText(pLines[i],rvX,cY+i*reviewLH());
  const textEndY=cY+pLines.length*reviewLH();
  drawSpoiler(ctx,t,isL,unified,rvX+rvW-120,30);
  drawFooter(ctx,v,t,isL,unified,rvX,rvW,H,textEndY);
  if(pageIdx<total-1){ctx.font="500 14px 'Pretendard',sans-serif";ctx.fillStyle=t.accent;ctx.globalAlpha=0.5;ctx.textAlign="right";ctx.fillText("\u25b8\u25b8",rvX+rvW,H-PAGE_PAD_BOTTOM+10);ctx.textAlign="left";ctx.globalAlpha=1;}
  drawPageIndicator(ctx,W,H,t,pageIdx+1,total);
  ctx.font="500 10px 'Pretendard',sans-serif";ctx.fillStyle=t.accent;ctx.globalAlpha=0.08;
  ctx.textAlign="right";ctx.fillText("© wcoconut",W-30,H-8);ctx.textAlign="left";ctx.globalAlpha=1;
}

let pvPage=0,pvLayout=null;
function renderPreview(precomputedLayout){
  const c=document.getElementById("preview");
  pvLayout=precomputedLayout||getReviewLayout();
  const total=pvLayout.pages.length;
  if(pvPage>=total)pvPage=total-1;
  const pg=pvLayout.pages[pvPage];
  c.width=CARD_W;c.height=pg.h;
  if(pvPage===0)drawPage1(c.getContext("2d"),CARD_W,pg.h,pvLayout);
  else drawContPage(c.getContext("2d"),CARD_W,pg.h,pvLayout,pvPage);
  const nav=document.getElementById("pvNav"),ind=document.getElementById("pvNavInd");
  if(total>1){nav.classList.add("show");ind.textContent=(pvPage+1)+" / "+total;
    nav.querySelector(".pv-nav-btn:first-child").disabled=pvPage===0;
    nav.querySelector(".pv-nav-btn:last-child").disabled=pvPage>=total-1;
  } else {nav.classList.remove("show");}
  const d=I18N[currentLang],ow=document.getElementById("pvOverflow");
  if(pvLayout.overflow){ow.textContent=d.overflow;ow.classList.add("show");}else{ow.classList.remove("show");}
  document.getElementById("exportBtn").textContent=total>1?(d.exportBtn+" ("+total+(currentLang==="ja"?"\u30da\u30fc\u30b8":"페이지")+")"):d.exportBtn;
  // [수정 #9] 미니 프리뷰 직접 통합 (래퍼 패턴 제거)
  if(document.body.dataset.pvMode==="float")renderMiniPreview();
}
function prevPage(){if(pvPage>0){pvPage--;renderPreview();}}
function nextPage(){if(pvLayout&&pvPage<pvLayout.pages.length-1){pvPage++;renderPreview();}}

function updateAll(){
  themeSelect.value=state.themeKey;
  document.getElementById("ratingRow").querySelectorAll(".rating-btn").forEach((b,i)=>{const v=I18N.ko.ratings[i];let c="rating-btn";if(v===state.ageRating){if(v==="\uc120\ud0dd\uc548\ud568")c+=" active-none";else if(v==="\uc804\uc5f0\ub839")c+=" active-all";else if(v==="R15")c+=" active-r15";else if(v==="R18")c+=" active-r18";}b.className=c;});
  document.getElementById("starSelectRow").querySelectorAll(".rating-btn").forEach((b,i)=>b.className="rating-btn"+(I18N.ko.stars[i]===state.starRating?" active-none":""));
  document.getElementById("heartSelectRow").querySelectorAll(".rating-btn").forEach((b,i)=>b.className="rating-btn"+(I18N.ko.hearts[i]===state.eroRating?" active-none":""));
  colorGrid.querySelectorAll(".color-swatch").forEach(s=>s.className="color-swatch"+(s.dataset.hex==="auto"?" color-swatch-auto":"")+(s.dataset.hex===state.reviewColor?" active":""));
  document.getElementById("headerTitle").style.color=THEME_MAP[state.themeKey].accent;
  const ta=document.getElementById("thumbActions");
  if(!state.thumbImg){document.getElementById("thumbLabel").textContent=I18N[currentLang].thumbIn;ta.classList.remove("show");}
  else{document.getElementById("thumbLabel").innerHTML='<img src="'+state.thumbUrl+'" class="thumb-preview"><span style="font-size:12px;color:'+THEME_MAP[state.themeKey].accent+'">'+I18N[currentLang].thumbChange+'</span>';ta.classList.add("show");}
  const t=THEME_MAP[state.themeKey];document.getElementById("exportBtn").style.background="linear-gradient(135deg,"+t.accent+","+t.bg1+")";document.getElementById("thumbBox").style.borderColor=t.accent+"40";
  // [수정 #3] renderPreview 내부에서 레이아웃 계산 + overflow/exportBtn 갱신을 이미 처리
  renderPreview();
}

// 썸네일 완전 삭제 (메모리 누수 차단)
function removeThumb(){
  if(state.thumbUrl&&state.thumbUrl.startsWith('blob:')){URL.revokeObjectURL(state.thumbUrl);}
  state.thumbImg=null;state.thumbUrl=null;state.originalImg=null;
  document.getElementById("fileInput").value="";updateAll();
}

function exportImage(){
  const layout=getReviewLayout(),total=layout.pages.length;
  const sfx=currentLang==="ja"?"review-ja":"review-ko",ts=Date.now();
  const isMobile=/Android|iPhone|iPad|iPod/i.test(navigator.userAgent)||(navigator.maxTouchPoints>1&&/Macintosh/i.test(navigator.userAgent));
  async function saveBlob(blob,fname){
    if(isMobile&&navigator.canShare){const file=new File([blob],fname,{type:"image/png"});if(navigator.canShare({files:[file]})){try{await navigator.share({files:[file]});return true;}catch(e){if(e.name==="AbortError")return false;}}}

      else if(ie.cropAction==='ne'){nw=Math.max(20,r.w+dx);ny=r.y+dy;nh=Math.max(20,r.h-dy);}
      else if(ie.cropAction==='nw'){nx=r.x+dx;ny=r.y+dy;nw=Math.max(20,r.w-dx);nh=Math.max(20,r.h-dy);}
      if(ie.cropRatio&&nw>20&&nh>20){const rat=ie.cropRatio;
        if(nw/rat>nh){nh=nw/rat;}else{nw=nh*rat;}
        if(ie.cropAction==='nw'){nx=r.x+r.w-nw;ny=r.y+r.h-nh;}
        else if(ie.cropAction==='ne'){ny=r.y+r.h-nh;}
        else if(ie.cropAction==='sw'){nx=r.x+r.w-nw;}}
      ie.crop.sx=nx;ie.crop.sy=ny;ie.crop.ex=nx+nw;ie.crop.ey=ny+nh;
    }
    ieRender();}
  else if(ie.tool==="crop"&&!ie.cropAction&&ie.crop.active){
    const hit=cropHitTest(p);
    const cur={nw:'nwse-resize',se:'nwse-resize',ne:'nesw-resize',sw:'nesw-resize',move:'move',confirm:'pointer'};
    ieCanvas.style.cursor=cur[hit]||'crosshair';}
  else if(ie.tool==="crop"&&!ie.crop.active){ieCanvas.style.cursor='crosshair';}
  else if((ie.tool==="blur"||ie.tool==="mosaic")&&ie.painting){iePaintAt(rp.x,rp.y);}
  else if(ie.tool==="sticker"&&ie.stickerDrag){const st=ie.stickers[ie.stickerDrag.idx];st.x=(p.x-ie.stickerDrag.offX)/ie.scale;st.y=(p.y-ie.stickerDrag.offY)/ie.scale;ieRender();}
  else if(ie.tool==="sticker"&&ie.stickerResize){const st=ie.stickers[ie.stickerResize.idx],asp=ie.stickerResize.origW/ie.stickerResize.origH,nw=Math.max(30,ie.stickerResize.origW+(p.x-ie.stickerResize.startX)/ie.scale);st.w=nw;st.h=nw/asp;ieRender();}
}
function ieUp(){
  ie.cropAction=null;
  if((ie.tool==="blur"||ie.tool==="mosaic")&&ie.painting){ie.painting=false;
    const _uf=ie.filter;if((_uf.blur>0||_uf.mosaic>0)&&ie.filterBase)ensureFilterBase();
  }
  ie.stickerDrag=null;ie.stickerResize=null;
}

// [수정 #5] 브러시 페인팅용 버퍼 캔버스 재사용
const _pBuf1=document.createElement("canvas"),_pBuf2=document.createElement("canvas"),_pMask=document.createElement("canvas"),_pMosaic=document.createElement("canvas");

function iePaintAt(rx,ry){
  const src=ieGetCurrent();if(!src)return;const ctx=src.getContext("2d"),snap=ie._paintSnapshot;if(!snap)return;
  const r=ie.brushSize,strength=ie.intensity/100;
  const sx=Math.max(0,Math.floor(rx-r)),sy=Math.max(0,Math.floor(ry-r)),sw=Math.min(src.width-sx,r*2),sh=Math.min(src.height-sy,r*2);
  if(sw<=0||sh<=0)return;
  if(ie.tool==="blur"){
    const px=Math.max(2,Math.round(strength*40)),pad=px*3;
    const ex=Math.max(0,sx-pad),ey=Math.max(0,sy-pad),ew=Math.min(src.width-ex,sw+pad*2),eh=Math.min(src.height-ey,sh+pad*2);
    _pBuf1.width=ew;_pBuf1.height=eh;const tc=_pBuf1.getContext("2d");
    tc.filter="blur("+px+"px)";tc.drawImage(snap,ex,ey,ew,eh,0,0,ew,eh);
    _pBuf2.width=ew;_pBuf2.height=eh;const tc2=_pBuf2.getContext("2d");
    tc2.filter="blur("+Math.round(px*0.5)+"px)";tc2.drawImage(_pBuf1,0,0);
    _pMask.width=src.width;_pMask.height=src.height;const mc=_pMask.getContext("2d");
    mc.clearRect(0,0,src.width,src.height);
    const grad=mc.createRadialGradient(rx,ry,r*0.3,rx,ry,r);
    grad.addColorStop(0,"rgba(255,255,255,1)");grad.addColorStop(0.7,"rgba(255,255,255,0.6)");grad.addColorStop(1,"rgba(255,255,255,0)");
    mc.fillStyle=grad;mc.fillRect(0,0,src.width,src.height);
    mc.globalCompositeOperation="source-in";mc.drawImage(_pBuf2,ex,ey);
    mc.globalCompositeOperation="source-over";
    ctx.drawImage(_pMask,0,0);
  } else if(ie.tool==="mosaic"){
    const bs=Math.max(2,Math.round(2+strength*20)),imgD=snap.getContext("2d").getImageData(sx,sy,sw,sh),out=ctx.createImageData(sw,sh);
    for(let by=0;by<sh;by+=bs){for(let bx=0;bx<sw;bx+=bs){let rr=0,gg=0,bb=0,aa=0,cnt=0;
      for(let yy=by;yy<Math.min(by+bs,sh);yy++){for(let xx=bx;xx<Math.min(bx+bs,sw);xx++){const idx=(yy*sw+xx)*4;rr+=imgD.data[idx];gg+=imgD.data[idx+1];bb+=imgD.data[idx+2];aa+=imgD.data[idx+3];cnt++;}}
      rr=Math.round(rr/cnt);gg=Math.round(gg/cnt);bb=Math.round(bb/cnt);aa=Math.round(aa/cnt);
      for(let yy=by;yy<Math.min(by+bs,sh);yy++){for(let xx=bx;xx<Math.min(bx+bs,sw);xx++){const idx=(yy*sw+xx)*4;out.data[idx]=rr;out.data[idx+1]=gg;out.data[idx+2]=bb;out.data[idx+3]=aa;}}}}
    _pMosaic.width=sw;_pMosaic.height=sh;_pMosaic.getContext("2d").putImageData(out,0,0);
    ctx.save();ctx.beginPath();ctx.arc(rx,ry,r,0,Math.PI*2);ctx.clip();ctx.drawImage(_pMosaic,sx,sy);ctx.restore();
  }
  ieRender();
}
function doCrop(){
  const c=ie.crop,sc=ie.scale,x=Math.round(Math.min(c.sx,c.ex)/sc),y=Math.round(Math.min(c.sy,c.ey)/sc),w=Math.round(Math.abs(c.ex-c.sx)/sc),h=Math.round(Math.abs(c.ey-c.sy)/sc);
  if(w<10||h<10)return;const src=ieGetCurrent(),cx=Math.max(0,Math.min(x,src.width)),cy=Math.max(0,Math.min(y,src.height)),cw=Math.min(w,src.width-cx),ch=Math.min(h,src.height-cy);
  const nc=document.createElement("canvas");nc.width=cw;nc.height=ch;nc.getContext("2d").drawImage(src,cx,cy,cw,ch,0,0,cw,ch);
  iePushHistory(nc);ie.crop={active:false,sx:0,sy:0,ex:0,ey:0};ieRender();
}
document.getElementById("stickerFileInput").addEventListener("change",e=>{
  const files=e.target.files;if(!files.length)return;
  Array.from(files).forEach(f=>{const u=URL.createObjectURL(f);const img=new Image();img.onload=()=>{
    URL.revokeObjectURL(u); // [수정 #6] 스티커 Blob URL 해제
    const src=ieGetCurrent();const md=Math.min(src.width,src.height)*0.3,asp=img.width/img.height;
    ie.stickers.push({img,x:src.width/2-md/2,y:src.height/2-md/asp/2,w:md,h:md/asp});ieRender();};img.src=u;});e.target.value="";
});

// [수정] 편집 완료 후 적용 함수 (기존 파일 메모리 완전 정리 최적화)
function ieApply() {
  const _af = ie.filter, _anyF = _af.blur > 0 || _af.mosaic > 0 || _af.gray > 0 || _af.brightness > 0 || _af.contrast > 0 || _af.sepia > 0 || _af.saturate > 0;
  if (_anyF) {
    const full = ieGetCurrent();
    const filtered = applyFilters(full, ie.filter);
    iePushHistory(filtered);
    ie.filter = { blur: 0, mosaic: 0, gray: 0, brightness: 0, contrast: 0, sepia: 0, saturate: 0 };
    ie.filterBase = null;
  }
  let src = ieGetCurrent();
  const final = document.createElement("canvas");
  final.width = src.width; final.height = src.height;
  const fc = final.getContext("2d"); fc.drawImage(src, 0, 0);
  ie.stickers.forEach(st => fc.drawImage(st.img, st.x, st.y, st.w, st.h));
  
  // [수정 #7] toDataURL → toBlob + createObjectURL (메모리 효율 개선)
  final.toBlob(blob => {
    if (!blob) return;
    const du = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      if (state.thumbUrl && state.thumbUrl.startsWith('blob:')) {
        URL.revokeObjectURL(state.thumbUrl);
      }
      state.thumbImg = img;
      state.thumbUrl = du;
      closeImageEditor();
      updateAll();
    };
    img.src = du;
  }, "image/png");
}

window.addEventListener("resize",()=>{if(document.getElementById("ieOverlay").classList.contains("open"))ieRender();});
window.addEventListener("keydown",e=>{
  if(document.getElementById("ieOverlay").classList.contains("open")){
    if(e.key==="Enter"&&ie.tool==="crop"&&ie.crop.active){e.preventDefault();doCrop();}
    if(e.key==="Escape"&&ie.tool==="crop"&&ie.crop.active){e.preventDefault();ie.crop={active:false,sx:0,sy:0,ex:0,ey:0};ie.cropAction=null;ieRender();}
  }
});

function setPvMode(mode){
  document.body.dataset.pvMode=mode;
  localStorage.setItem("pvMode",mode);
  document.getElementById("pvStickyBtn").classList.toggle("active",mode==="sticky");
  document.getElementById("pvFloatBtn").classList.toggle("active",mode==="float");
  if(mode==="float")renderMiniPreview();
}
function renderMiniPreview(){
  const main=document.getElementById("preview"),mini=document.getElementById("previewMini");
  if(!main||!main.width)return;
  const boxW=98,boxH=68;
  const sc=Math.min(boxW/main.width,boxH/main.height);
  mini.width=Math.round(main.width*sc);mini.height=Math.round(main.height*sc);
  const mc=mini.getContext("2d");mc.imageSmoothingEnabled=true;mc.imageSmoothingQuality="high";
  mc.drawImage(main,0,0,mini.width,mini.height);
}
function openPvFull(){
  const overlay=document.getElementById("pvFull"),main=document.getElementById("preview"),full=document.getElementById("previewFull");
  full.width=main.width;full.height=main.height;
  full.getContext("2d").drawImage(main,0,0);
  overlay.classList.add("open");
}
function closePvFull(){document.getElementById("pvFull").classList.remove("open");}

const SAVE_KEY="vdrc_save";
let _saveTimer=null;
function autoSave(){
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    const d={themeKey:state.themeKey,starRating:state.starRating,eroRating:state.eroRating,ageRating:state.ageRating,progress:state.progress,reviewColor:state.reviewColor,showDate:state.showDate,spoiler:state.spoiler,qrUrl:state.qrUrl,
      title:document.getElementById("inTitle").value,circle:document.getElementById("inCircle").value,artist:document.getElementById("inArtist").value,genre:document.getElementById("inGenre").value,
      review:document.getElementById("inReview").value,reviewer:document.getElementById("inReviewer").value,headline:document.getElementById("inHeadline").value,lang:currentLang};
    try{localStorage.setItem(SAVE_KEY,JSON.stringify(d));}catch(e){}
  },400);
}
function autoLoad(){
  try{

    const d=JSON.parse(raw);
    if(d.themeKey)state.themeKey=d.themeKey;
    if(d.starRating)state.starRating=d.starRating;
    if(d.eroRating)state.eroRating=d.eroRating;
    if(d.ageRating)state.ageRating=d.ageRating;

    if(d.qrUrl){state.qrUrl=d.qrUrl;document.getElementById("inQR").value=d.qrUrl;}

    if(d.circle)document.getElementById("inCircle").value=d.circle;
    if(d.artist)document.getElementById("inArtist").value=d.artist;
    if(d.genre)document.getElementById("inGenre").value=d.genre;
